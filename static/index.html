<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>P25 Monitor</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1e2530;
  --border:     #30363d;
  --text:       #e6edf3;
  --muted:      #7d8590;
  --police:     #3b82f6;
  --fire:       #ef4444;
  --ems:        #22c55e;
  --other:      #6b7280;
  --summary:    #f59e0b;
  --radius:     10px;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
             font-size: 14px; }

/* ── Login ── */
#login-screen { display: flex; align-items: center; justify-content: center;
                height: 100vh; }
.login-card { background: var(--surface); border: 1px solid var(--border);
              border-radius: var(--radius); padding: 32px; width: 320px;
              display: flex; flex-direction: column; gap: 16px; }
.login-card h1 { font-size: 20px; font-weight: 600; text-align: center; }
.login-card .logo { text-align: center; font-size: 48px; margin-bottom: 4px; }
.login-card input { background: var(--bg); border: 1px solid var(--border);
                    border-radius: 6px; padding: 10px 12px; color: var(--text);
                    font-size: 14px; width: 100%; }
.login-card input:focus { outline: none; border-color: var(--police); }
.btn-primary { background: var(--police); color: #fff; border: none;
               border-radius: 6px; padding: 11px; font-size: 14px;
               font-weight: 600; cursor: pointer; width: 100%; }
.btn-primary:hover { filter: brightness(1.15); }
.login-error { color: var(--fire); font-size: 13px; text-align: center; display: none; }

/* ── App shell ── */
#app { display: none; flex-direction: column; height: 100vh; }

header { background: var(--surface); border-bottom: 1px solid var(--border);
         padding: 0 16px; height: 52px; display: flex; align-items: center;
         gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; flex: 1; }
.header-title span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ems);
            animation: pulse 2s infinite; }
.live-dot.dead { background: var(--fire); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.filter-tabs { display: flex; gap: 4px; }
.filter-tab { background: none; border: 1px solid var(--border); border-radius: 20px;
              color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer;
              transition: all .15s; }
.filter-tab.active, .filter-tab:hover { color: var(--text); border-color: var(--text); }
.filter-tab[data-filter="police"].active  { color: var(--police); border-color: var(--police); }
.filter-tab[data-filter="fire"].active    { color: var(--fire);   border-color: var(--fire);   }
.filter-tab[data-filter="ems"].active     { color: var(--ems);    border-color: var(--ems);    }

/* ── Feed ── */
#feed { flex: 1; overflow-y: auto; padding: 12px 16px 80px; }

.incident-group { margin-bottom: 20px; }
.incident-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.incident-time { font-size: 11px; color: var(--muted); font-family: monospace; }
.incident-line { flex: 1; height: 1px; background: var(--border); }
.incident-badge { font-size: 10px; color: var(--muted); background: var(--surface);
                  border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px;
                  white-space: nowrap; }

/* ── TX card ── */
.tx-card { background: var(--surface); border: 1px solid var(--border);
           border-radius: var(--radius); margin-bottom: 6px; overflow: hidden;
           cursor: pointer; transition: border-color .15s, transform .1s; }
.tx-card:hover { border-color: var(--border); transform: translateY(-1px);
                 box-shadow: 0 4px 12px rgba(0,0,0,.4); }
.tx-card.expanded { border-color: var(--border); }
.tx-card[data-agency="police"] { border-left: 3px solid var(--police); }
.tx-card[data-agency="fire"]   { border-left: 3px solid var(--fire);   }
.tx-card[data-agency="ems"]    { border-left: 3px solid var(--ems);    }
.tx-card[data-agency="other"]  { border-left: 3px solid var(--other);  }

.tx-card-inner { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
.tx-meta { display: flex; align-items: center; gap: 8px; }
.tg-badge { font-size: 11px; font-weight: 600; border-radius: 4px; padding: 2px 7px; }
.tg-badge[data-agency="police"] { background: rgba(59,130,246,.2);  color: var(--police); }
.tg-badge[data-agency="fire"]   { background: rgba(239,68,68,.2);   color: var(--fire);   }
.tg-badge[data-agency="ems"]    { background: rgba(34,197,94,.2);   color: var(--ems);    }
.tg-badge[data-agency="other"]  { background: rgba(107,114,128,.2); color: var(--other);  }
.tx-time { font-size: 11px; color: var(--muted); font-family: monospace; margin-left: auto; }
.tx-text { font-size: 13px; line-height: 1.5; color: var(--text); }
.tx-text.truncated { display: -webkit-box; -webkit-line-clamp: 2;
                     -webkit-box-orient: vertical; overflow: hidden; }
.tx-expand { font-size: 11px; color: var(--muted); padding-top: 2px; display: none; }
.tx-card.has-more .tx-expand { display: block; }
.tx-card.expanded .tx-text { -webkit-line-clamp: unset; overflow: visible; }

/* ── Summary card ── */
.summary-card { background: rgba(245,158,11,.06); border: 1px solid rgba(245,158,11,.3);
                border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
.summary-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px 0; }
.summary-label { font-size: 11px; font-weight: 700; color: var(--summary);
                 letter-spacing: .5px; }
.summary-time { font-size: 11px; color: var(--muted); font-family: monospace;
                margin-left: auto; }
.summary-text { padding: 8px 14px 12px; font-size: 13px; line-height: 1.65;
                color: var(--text); white-space: pre-wrap; }

/* ── Summarize button ── */
#summarize-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
                 padding: 12px 16px; background: linear-gradient(transparent, var(--bg) 40%);
                 pointer-events: none; }
#summarize-btn { pointer-events: all; width: 100%; max-width: 480px;
                 margin: 0 auto; display: block; background: var(--surface2);
                 border: 1px solid var(--border); border-radius: 10px;
                 color: var(--text); padding: 13px; font-size: 14px; font-weight: 600;
                 cursor: pointer; display: flex; align-items: center; justify-content: center;
                 gap: 8px; transition: background .15s; }
#summarize-btn:hover { background: var(--surface); border-color: var(--summary); color: var(--summary); }
#summarize-btn svg { width: 16px; height: 16px; }

/* ── Modal ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.7);
                  z-index: 100; display: none; align-items: flex-end;
                  justify-content: center; padding: 16px; }
.modal-backdrop.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border);
         border-radius: 14px; width: 100%; max-width: 520px; overflow: hidden; }
.modal-header { display: flex; align-items: center; padding: 16px 18px 12px;
                border-bottom: 1px solid var(--border); }
.modal-title { font-weight: 600; font-size: 15px; flex: 1; }
.modal-close { background: none; border: none; color: var(--muted); cursor: pointer;
               font-size: 20px; line-height: 1; padding: 0 4px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
.modal-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.modal-textarea { background: var(--bg); border: 1px solid var(--border);
                  border-radius: 8px; color: var(--text); font-size: 13px;
                  padding: 10px 12px; resize: vertical; min-height: 80px; width: 100%;
                  font-family: inherit; line-height: 1.5; }
.modal-textarea:focus { outline: none; border-color: var(--summary); }
.modal-footer { padding: 0 18px 16px; display: flex; gap: 8px; }
.btn-secondary { flex: 1; background: none; border: 1px solid var(--border);
                 color: var(--muted); border-radius: 8px; padding: 10px;
                 font-size: 13px; cursor: pointer; }
.btn-secondary:hover { color: var(--text); border-color: var(--text); }
.btn-run { flex: 2; background: var(--summary); color: #000; border: none;
           border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700;
           cursor: pointer; }
.btn-run:hover { filter: brightness(1.1); }
.btn-run:disabled { opacity: .5; cursor: default; filter: none; }
.summary-stream { background: var(--bg); border: 1px solid var(--border);
                  border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.65;
                  max-height: 300px; overflow-y: auto; white-space: pre-wrap;
                  display: none; color: var(--text); }

/* ── Empty state ── */
.empty-state { text-align: center; color: var(--muted); padding: 60px 20px;
               display: none; flex-direction: column; align-items: center; gap: 10px; }
.empty-state svg { opacity: .3; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">📡</div>
    <h1>P25 Monitor</h1>
    <input id="login-user" type="text" placeholder="Username" value="p25" autocomplete="username">
    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" id="login-btn">Sign in</button>
    <div class="login-error" id="login-error">Invalid credentials</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="live-dot" id="live-dot"></div>
    <div class="header-title">P25 Monitor <span>Tippecanoe County</span></div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="police">Police</button>
      <button class="filter-tab" data-filter="fire">Fire</button>
      <button class="filter-tab" data-filter="ems">EMS</button>
    </div>
  </header>

  <div id="feed">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 20.25h.008v.008H12v-.008z"/>
      </svg>
      <div>No traffic yet</div>
      <div style="font-size:12px">Waiting for OP25 transmissions…</div>
    </div>
  </div>
</div>

<!-- Summarize FAB -->
<div id="summarize-bar">
  <button id="summarize-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    Request Summary
  </button>
</div>

<!-- Summary modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">AI Summary</div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-label">Note (optional — added as context for Claude)</div>
      <textarea class="modal-textarea" id="modal-note" placeholder="e.g. heard a pursuit mentioned on scanner…"></textarea>
      <div class="summary-stream" id="summary-stream"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn-run" id="modal-run">Run Summary</button>
    </div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
let AUTH = sessionStorage.getItem('p25_auth') || '';

function authHeader() {
  return AUTH ? { 'Authorization': 'Basic ' + AUTH } : {};
}

async function tryLogin(user, pass) {
  const creds = btoa(user + ':' + pass);
  const r = await fetch('/api/entries', { headers: { 'Authorization': 'Basic ' + creds } });
  if (r.ok) {
    AUTH = creds;
    sessionStorage.setItem('p25_auth', AUTH);
    return { ok: true, data: await r.json() };
  }
  return { ok: false };
}

document.getElementById('login-btn').onclick = async () => {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const result = await tryLogin(user, pass);
  if (result.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('summarize-bar').style.display = 'block';
    init(result.data);
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
};

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// Auto-login if we have stored creds
if (AUTH) {
  (async () => {
    const r = await fetch('/api/entries', { headers: authHeader() });
    if (r.ok) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      init(await r.json());
    } else {
      AUTH = '';
      sessionStorage.removeItem('p25_auth');
    }
  })();
}

// ── State ─────────────────────────────────────────────────────────────────────
let entries  = [];
let filter   = 'all';
let autoScroll = true;

// ── Render ────────────────────────────────────────────────────────────────────
function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function agencyLabel(agency) {
  return { police: 'POLICE', fire: 'FIRE', ems: 'EMS', other: 'OTHER' }[agency] || 'OTHER';
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty-state');
  const visible = filter === 'all'
    ? entries
    : entries.filter(e => e.type === 'summary' || e.agency === filter);

  if (!visible.length) {
    empty.style.display = 'flex';
    feed.innerHTML = '';
    feed.appendChild(empty);
    return;
  }
  empty.style.display = 'none';

  // Group into incident clusters (> 5 min gap = new group)
  const groups = [];
  let cur = null;
  for (const entry of visible) {
    if (entry.type === 'summary') {
      if (cur) { groups.push(cur); cur = null; }
      groups.push({ kind: 'summary', entry });
      continue;
    }
    const mins = timeToMins(entry.time);
    if (!cur || Math.abs(mins - cur.endMins) > 5) {
      if (cur) groups.push(cur);
      cur = { kind: 'group', startTime: entry.time, endMins: mins, entries: [] };
    }
    cur.entries.push(entry);
    cur.endMins = mins;
  }
  if (cur) groups.push(cur);

  const scrollBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 40;

  feed.innerHTML = '';
  for (const g of groups) {
    if (g.kind === 'summary') {
      feed.appendChild(makeSummaryCard(g.entry));
    } else {
      const div = document.createElement('div');
      div.className = 'incident-group';
      const agencies = [...new Set(g.entries.map(e => e.agency))];
      const label = agencies.map(a => agencyLabel(a)).join(' · ');
      div.innerHTML = `
        <div class="incident-header">
          <div class="incident-line"></div>
          <div class="incident-time">${g.startTime}</div>
          <div class="incident-badge">${label}</div>
          <div class="incident-line"></div>
        </div>`;
      for (const e of g.entries) div.appendChild(makeTxCard(e));
      feed.appendChild(div);
    }
  }

  if (autoScroll || scrollBottom) {
    feed.scrollTop = feed.scrollHeight;
  }
}

function makeTxCard(entry) {
  const card = document.createElement('div');
  card.className = 'tx-card';
  card.dataset.agency = entry.agency;
  card.dataset.id = entry.id;
  const long = entry.text.length > 120;
  if (long) card.classList.add('has-more');
  card.innerHTML = `
    <div class="tx-card-inner">
      <div class="tx-meta">
        <span class="tg-badge" data-agency="${entry.agency}">${entry.talkgroup}</span>
        <span class="tx-time">${entry.time}</span>
      </div>
      <div class="tx-text${long ? ' truncated' : ''}">${escHtml(entry.text)}</div>
      ${long ? '<div class="tx-expand">tap to expand ↓</div>' : ''}
    </div>`;
  card.onclick = () => {
    card.classList.toggle('expanded');
    card.querySelector('.tx-text')?.classList.toggle('truncated');
    const exp = card.querySelector('.tx-expand');
    if (exp) exp.textContent = card.classList.contains('expanded') ? 'tap to collapse ↑' : 'tap to expand ↓';
  };
  return card;
}

function makeSummaryCard(entry) {
  const card = document.createElement('div');
  card.className = 'summary-card';
  card.dataset.id = entry.id;
  card.innerHTML = `
    <div class="summary-header">
      <span class="summary-label">AI SUMMARY</span>
      <span class="summary-time">${entry.time}</span>
    </div>
    <div class="summary-text">${escHtml(entry.text)}</div>`;
  return card;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Filters ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    renderFeed();
  };
});

// ── Auto-scroll detection ─────────────────────────────────────────────────────
document.getElementById('feed').addEventListener('scroll', () => {
  const feed = document.getElementById('feed');
  autoScroll = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 60;
});

// ── SSE live stream ───────────────────────────────────────────────────────────
async function startStream() {
  const dot = document.getElementById('live-dot');
  while (true) {
    try {
      const resp = await fetch('/api/stream', { headers: authHeader() });
      if (!resp.ok) { await sleep(5000); continue; }
      dot.classList.remove('dead');
      const reader = resp.body.getReader();
      const dec    = new TextDecoder();
      let   buf    = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data:')) continue;
          const payload = JSON.parse(line.slice(5).trim());
          if (payload.type === 'tx') {
            entries.push({ ...payload, id: `tx-${Date.now()}-${Math.random()}` });
            renderFeed();
          }
        }
      }
    } catch (e) { /* reconnect */ }
    dot.classList.add('dead');
    await sleep(3000);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Summary modal ─────────────────────────────────────────────────────────────
const modal       = document.getElementById('modal');
const modalNote   = document.getElementById('modal-note');
const streamBox   = document.getElementById('summary-stream');
const runBtn      = document.getElementById('modal-run');
const cancelBtn   = document.getElementById('modal-cancel');
const closeBtn    = document.getElementById('modal-close');

document.getElementById('summarize-btn').onclick = () => {
  modalNote.value = '';
  streamBox.style.display = 'none';
  streamBox.textContent   = '';
  runBtn.disabled = false;
  runBtn.textContent = 'Run Summary';
  cancelBtn.textContent = 'Cancel';
  modal.classList.add('open');
  setTimeout(() => modalNote.focus(), 50);
};

function closeModal() { modal.classList.remove('open'); }
closeBtn.onclick  = closeModal;
cancelBtn.onclick = closeModal;
modal.onclick = e => { if (e.target === modal) closeModal(); };

runBtn.onclick = async () => {
  runBtn.disabled    = true;
  runBtn.textContent = 'Running…';
  streamBox.style.display = 'block';
  streamBox.textContent   = '';
  cancelBtn.textContent   = 'Close';

  try {
    const resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: modalNote.value.trim() }),
    });

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';
    let   full   = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const payload = JSON.parse(line.slice(5).trim());
        if (payload.text) {
          full += payload.text;
          streamBox.textContent = full;
          streamBox.scrollTop   = streamBox.scrollHeight;
        }
        if (payload.done) {
          // Reload entries to show the new summary card in feed
          const r = await fetch('/api/entries', { headers: authHeader() });
          if (r.ok) { entries = await r.json(); renderFeed(); }
          runBtn.textContent = 'Done ✓';
        }
      }
    }
  } catch (e) {
    streamBox.textContent = 'Error: ' + e.message;
    runBtn.textContent = 'Run Summary';
    runBtn.disabled = false;
  }
};

// ── Init ──────────────────────────────────────────────────────────────────────
function init(data) {
  entries = data;
  renderFeed();
  startStream();
}
</script>
</body>
</html>
