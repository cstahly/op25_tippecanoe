<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>P25 Monitor</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1e2530;
  --border:     #30363d;
  --text:       #e6edf3;
  --muted:      #7d8590;
  --police:     #3b82f6;
  --fire:       #ef4444;
  --ems:        #22c55e;
  --other:      #6b7280;
  --summary:    #f59e0b;
  --radius:     10px;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
             font-size: 14px; }

/* ── Login ── */
#login-screen { display: flex; align-items: center; justify-content: center;
                height: 100vh; }
.login-card { background: var(--surface); border: 1px solid var(--border);
              border-radius: var(--radius); padding: 32px; width: 320px;
              display: flex; flex-direction: column; gap: 16px; }
.login-card h1 { font-size: 20px; font-weight: 600; text-align: center; }
.login-card .logo { text-align: center; font-size: 48px; margin-bottom: 4px; }
.login-card input { background: var(--bg); border: 1px solid var(--border);
                    border-radius: 6px; padding: 10px 12px; color: var(--text);
                    font-size: 14px; width: 100%; }
.login-card input:focus { outline: none; border-color: var(--police); }
.btn-primary { background: var(--police); color: #fff; border: none;
               border-radius: 6px; padding: 11px; font-size: 14px;
               font-weight: 600; cursor: pointer; width: 100%; }
.btn-primary:hover { filter: brightness(1.15); }
.login-error { color: var(--fire); font-size: 13px; text-align: center; display: none; }

/* ── App shell ── */
#app { display: none; flex-direction: column; height: 100vh; }

header { background: var(--surface); border-bottom: 1px solid var(--border);
         padding: 0 16px; height: 52px; display: flex; align-items: center;
         gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; flex: 1; }
.header-title span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
.update-status { color: var(--muted); font-family: monospace; font-size: 11px; max-width: 280px;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ems);
            animation: pulse 2s infinite; }
.live-dot.dead { background: var(--fire); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.header-controls { display: flex; align-items: center; gap: 8px; }
.view-tabs { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border);
             border-radius: 8px; padding: 3px; }
.view-tab { background: transparent; border: 0; border-radius: 5px; color: var(--muted);
            cursor: pointer; font-size: 12px; font-weight: 700; padding: 5px 9px; }
.view-tab.active { background: var(--surface2); color: var(--text); }

.icon-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); width: 34px; height: 34px; display: inline-flex;
            align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.icon-btn:hover { border-color: var(--text); }
.icon-btn svg { width: 17px; height: 17px; }
.icon-group { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

.filter-tabs { display: flex; gap: 4px; }
.filter-tab { background: none; border: 1px solid var(--border); border-radius: 20px;
              color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer;
              transition: all .15s; }
.filter-tab.active, .filter-tab:hover { color: var(--text); border-color: var(--text); }
.filter-tab[data-filter="police"].active  { color: var(--police); border-color: var(--police); }
.filter-tab[data-filter="fire"].active    { color: var(--fire);   border-color: var(--fire);   }
.filter-tab[data-filter="ems"].active     { color: var(--ems);    border-color: var(--ems);    }

/* ── Feed ── */
#feed, #incidents { flex: 1; overflow-y: auto; padding: 12px 16px 180px; }
#incidents { display: none; }

.feed-list { display: grid; gap: 6px; }

/* ── TX card ── */
.tx-card { background: var(--surface); border: 1px solid var(--border);
           border-radius: var(--radius); margin-bottom: 6px; overflow: hidden;
           cursor: pointer; transition: border-color .15s, transform .1s; }
.tx-card:hover { border-color: var(--border); transform: translateY(-1px);
                 box-shadow: 0 4px 12px rgba(0,0,0,.4); }
.tx-card.expanded { border-color: var(--border); }
.tx-card[data-agency="police"] { border-left: 3px solid var(--police); }
.tx-card[data-agency="fire"]   { border-left: 3px solid var(--fire);   }
.tx-card[data-agency="ems"]    { border-left: 3px solid var(--ems);    }
.tx-card[data-agency="other"]  { border-left: 3px solid var(--other);  }

.tx-card-inner { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
.tx-meta { display: flex; align-items: center; gap: 8px; }
.tg-badge { font-size: 11px; font-weight: 600; border-radius: 4px; padding: 2px 7px; }
.tg-badge[data-agency="police"] { background: rgba(59,130,246,.2);  color: var(--police); }
.tg-badge[data-agency="fire"]   { background: rgba(239,68,68,.2);   color: var(--fire);   }
.tg-badge[data-agency="ems"]    { background: rgba(34,197,94,.2);   color: var(--ems);    }
.tg-badge[data-agency="other"]  { background: rgba(107,114,128,.2); color: var(--other);  }
.tx-time { font-size: 11px; color: var(--muted); font-family: monospace; margin-left: auto; }
.tx-text { font-size: 13px; line-height: 1.5; color: var(--text); }
.tx-text.truncated { display: -webkit-box; -webkit-line-clamp: 2;
                     -webkit-box-orient: vertical; overflow: hidden; }
.tx-expand { font-size: 11px; color: var(--muted); padding-top: 2px; display: none; }
.tx-card.has-more .tx-expand { display: block; }
.tx-card.expanded .tx-text { -webkit-line-clamp: unset; overflow: visible; }

/* ── Summary card ── */
.summary-card { background: rgba(245,158,11,.06); border: 1px solid rgba(245,158,11,.3);
                border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
.summary-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px 0; }
.summary-label { font-size: 11px; font-weight: 700; color: var(--summary);
                 letter-spacing: .5px; }
.summary-time { font-size: 11px; color: var(--muted); font-family: monospace;
                margin-left: auto; }
.summary-text { padding: 8px 14px 12px; font-size: 13px; line-height: 1.65;
                color: var(--text); }
.summary-md { display: grid; gap: 7px; }
.summary-md h2, .summary-md h3 { color: var(--text); font-size: 14px; line-height: 1.3;
                                 margin: 8px 0 2px; }
.summary-md h2:first-child, .summary-md h3:first-child { margin-top: 0; }
.summary-md p { margin: 0; }
.summary-md ul { margin: 0; padding-left: 18px; display: grid; gap: 4px; }
.summary-md li { padding-left: 2px; }
.summary-md strong { color: #fff; font-weight: 800; }
.summary-md hr { border: 0; border-top: 1px solid rgba(245,158,11,.28); margin: 4px 0; }
.summary-md .summary-alert { color: #fcd34d; font-weight: 700; }

/* ── Incident board ── */
.incident-tools { max-width: 980px; margin: 0 auto 10px; display: flex; flex-wrap: wrap;
                  gap: 8px; align-items: center; }
.incident-search { flex: 1 1 260px; background: var(--surface); border: 1px solid var(--border);
                   border-radius: 8px; color: var(--text); font-size: 13px;
                   padding: 9px 10px; min-width: 0; }
.incident-search:focus { outline: none; border-color: var(--police); }
.incident-status-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
.incident-status-tab { background: var(--surface); color: var(--muted); border: 1px solid var(--border);
                       border-radius: 999px; padding: 7px 10px; font-size: 11px;
                       font-weight: 800; text-transform: uppercase; cursor: pointer; }
.incident-status-tab.active { color: var(--text); border-color: var(--police); background: rgba(59,130,246,.12); }
.incident-board { max-width: 980px; margin: 0 auto; display: grid; gap: 8px; }
.incident-card { background: var(--surface); border: 1px solid var(--border);
                 border-left-width: 4px; border-radius: 8px; overflow: hidden;
                 padding: 10px 12px; display: grid; gap: 8px; cursor: pointer; }
.incident-card:hover { border-color: rgba(148,163,184,.42); background: rgba(31,41,55,.72); }
.incident-card[data-kind="active"] { border-left-color: var(--summary); }
.incident-card[data-kind="clear"] { border-left-color: var(--ems); opacity: .82; }
.incident-card[data-kind="routine"] { border-left-color: var(--other); }
.incident-card[data-kind="watch"] { border-left-color: var(--police); }
.incident-card[data-stale="true"] { opacity: .68; }
.incident-row-main { display: flex; align-items: flex-start; justify-content: space-between;
                     gap: 12px; min-width: 0; }
.incident-card-title { font-size: 15px; font-weight: 800; line-height: 1.25; }
.incident-meta-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
                     justify-content: flex-end; flex: 0 1 auto; }
.incident-pill { border: 1px solid var(--border); border-radius: 999px; color: var(--muted);
                 font-size: 10px; font-weight: 800; letter-spacing: .35px;
                 padding: 3px 7px; text-transform: uppercase; }
.incident-pill.status-active { border-color: rgba(245,158,11,.55); color: var(--summary); }
.incident-pill.status-clear { border-color: rgba(34,197,94,.55); color: var(--ems); }
.incident-pill.status-routine { border-color: rgba(107,114,128,.65); color: var(--muted); }
.incident-pill.status-stale { border-color: rgba(107,114,128,.65); color: var(--muted); }
.incident-subline { display: flex; flex-wrap: wrap; align-items: center; gap: 7px 12px;
                    color: var(--muted); font-size: 12px; min-width: 0; }
.incident-location { color: var(--text); font-size: 12px; line-height: 1.35; }
.incident-location a,
.summary-md a.map-link { color: #93c5fd; text-decoration: none; }
.incident-location a:hover,
.summary-md a.map-link:hover { text-decoration: underline; }
.incident-agency { color: var(--muted); font-size: 12px; }
.incident-age { color: var(--muted); font-family: monospace; font-size: 11px; }
.incident-details { border-top: 1px solid rgba(148,163,184,.14); padding-top: 8px;
                    display: grid; gap: 5px; font-size: 12px; line-height: 1.45; min-width: 0; }
.incident-detail { color: var(--text); }
.incident-detail::before { content: ""; display: inline-block; width: 5px; height: 5px;
                           border-radius: 50%; background: var(--summary);
                           margin: 0 7px 2px 0; opacity: .8; }
.incident-empty { color: var(--muted); text-align: center; padding: 70px 20px; }

.incident-modal { position: fixed; inset: 0; z-index: 45; display: none;
                  align-items: center; justify-content: center; padding: 18px;
                  background: rgba(0,0,0,.62); backdrop-filter: blur(6px); }
.incident-modal.open { display: flex; }
.incident-panel { width: min(720px, 100%); max-height: min(760px, 92vh); overflow-y: auto;
                  background: var(--surface); border: 1px solid var(--border);
                  border-radius: 12px; box-shadow: 0 24px 70px rgba(0,0,0,.55);
                  display: grid; gap: 14px; padding: 16px; }
.incident-modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.incident-modal-kicker { color: var(--summary); font-size: 11px; font-weight: 800;
                         letter-spacing: .5px; text-transform: uppercase; }
.incident-modal-title { font-size: 18px; font-weight: 800; line-height: 1.25; margin-top: 3px; }
.incident-modal-grid { display: grid; gap: 10px; }
.incident-modal-row { display: grid; gap: 4px; }
.incident-modal-label { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
.incident-modal-value { color: var(--text); font-size: 13px; line-height: 1.5; }
.incident-status-controls { display: flex; flex-wrap: wrap; gap: 7px; }
.incident-status-control { background: var(--surface2); border: 1px solid var(--border);
                           border-radius: 8px; color: var(--text); cursor: pointer;
                           font-size: 12px; font-weight: 800; padding: 8px 10px;
                           text-transform: uppercase; }
.incident-status-control.active { border-color: var(--summary); color: var(--summary); }
.incident-status-control.clear-action { border-color: rgba(34,197,94,.55); color: var(--ems); }
.incident-modal-details { display: grid; gap: 7px; }
.incident-modal-error { display: none; color: #fecaca; border: 1px solid rgba(239,68,68,.45);
                        background: rgba(127,29,29,.25); border-radius: 8px; padding: 9px 10px;
                        font-size: 12px; }

/* ── Summary dock ── */
#summary-dock { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
                display: none; background: rgba(13,17,23,.96);
                border-top: 1px solid var(--border); padding: 10px 12px;
                backdrop-filter: blur(8px); }
.summary-dock-inner { max-width: 860px; margin: 0 auto; display: grid;
                      grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
.summary-note { background: var(--surface); border: 1px solid var(--border);
                border-radius: 8px; color: var(--text); font-size: 13px;
                padding: 9px 10px; resize: none; min-height: 38px; max-height: 88px;
                width: 100%; font-family: inherit; line-height: 1.4; }
.summary-note:focus { outline: none; border-color: var(--summary); }
.summary-btn-group { display: flex; gap: 6px; align-items: end; }
.summary-run { background: var(--summary); color: #000; border: none;
               border-radius: 8px; padding: 0 14px; height: 38px;
               font-size: 13px; font-weight: 700; cursor: pointer;
               white-space: nowrap; }
.summary-run:hover { filter: brightness(1.08); }
.summary-run:disabled { opacity: .55; cursor: default; filter: none; }
.summary-run.running::before { content: ""; display: inline-block; width: 12px; height: 12px;
                               margin-right: 7px; border-radius: 50%;
                               border: 2px solid rgba(0,0,0,.28); border-top-color: #000;
                               vertical-align: -2px; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.summary-output { grid-column: 1 / -1; background: var(--surface);
                  border: 1px solid rgba(245,158,11,.35); border-radius: 8px;
                  color: var(--text); display: none; font-size: 13px;
                  line-height: 1.55; max-height: 140px; overflow-y: auto;
                  padding: 10px; white-space: pre-wrap; }
.summary-output.error { border-color: rgba(239,68,68,.5); color: #fecaca; }

/* ── Share modal ── */
.share-modal { position: fixed; inset: 0; z-index: 40; display: none;
               align-items: center; justify-content: center; padding: 18px;
               background: rgba(0,0,0,.58); backdrop-filter: blur(6px); }
.share-modal.open { display: flex; }
.share-panel { width: min(440px, 100%); background: var(--surface);
               border: 1px solid var(--border); border-radius: 12px; padding: 16px;
               display: grid; gap: 14px; box-shadow: 0 24px 70px rgba(0,0,0,.55); }
.share-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.share-kicker { color: var(--summary); font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
.share-title { font-size: 16px; font-weight: 800; margin-top: 2px; }
.share-qr-wrap { background: #fff; border-radius: 12px; padding: 16px; display: flex; justify-content: center; }
.share-qr { width: 240px; height: 240px; image-rendering: pixelated; }
.share-url { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
             padding: 10px 12px; color: var(--text); font-size: 12px; line-height: 1.45;
             word-break: break-all; }
.share-meta { color: var(--muted); font-size: 12px; line-height: 1.45; }
.share-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border);
                 border-radius: 8px; padding: 9px 12px; font-size: 13px; font-weight: 700;
                 cursor: pointer; }
.btn-secondary:hover { border-color: var(--text); }

/* ── Empty state ── */
.empty-state { text-align: center; color: var(--muted); padding: 60px 20px;
               display: none; flex-direction: column; align-items: center; gap: 10px; }
.empty-state svg { opacity: .3; }

@media (max-width: 640px) {
  header { align-items: stretch; flex-wrap: wrap; height: auto; padding: 8px 10px; }
  .header-title { min-width: 180px; }
  .update-status { margin-left: auto; }
  .header-controls { order: 3; width: 100%; display: grid; grid-template-columns: minmax(0, 1fr) auto auto; }
  .view-tabs { min-width: 132px; }
  .view-tab { flex: 1; }
  .filter-tabs { overflow-x: auto; }
  #feed, #incidents { padding: 10px 10px 220px; }
  .incident-tools { display: grid; }
  .incident-row-main { display: grid; gap: 7px; }
  .incident-meta-row { justify-content: flex-start; }
  .summary-dock-inner { grid-template-columns: 1fr; }
  .summary-run { width: 100%; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">📡</div>
    <h1>P25 Monitor</h1>
    <input id="login-user" type="text" placeholder="Username" value="p25" autocomplete="username">
    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" id="login-btn">Sign in</button>
    <div class="login-error" id="login-error">Invalid credentials</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="live-dot" id="live-dot"></div>
    <div class="header-title">P25 Monitor <span>Tippecanoe County</span></div>
    <div class="update-status" id="update-status">starting</div>
    <div class="header-controls">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="police">Police</button>
        <button class="filter-tab" data-filter="fire">Fire</button>
        <button class="filter-tab" data-filter="ems">EMS</button>
      </div>
      <div class="view-tabs">
        <button class="view-tab active" data-view="feed">Log</button>
        <button class="view-tab" data-view="incidents">Incidents</button>
      </div>
      <div class="icon-group">
        <button class="icon-btn" id="audio-btn" title="Listen live">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </button>
        <button class="icon-btn" id="download-btn" title="Download raw log">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button class="icon-btn" id="share-btn" title="Share login QR" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div id="feed">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 20.25h.008v.008H12v-.008z"/>
      </svg>
      <div>No traffic yet</div>
      <div style="font-size:12px">Waiting for OP25 transmissions…</div>
    </div>
  </div>
  <div id="incidents">
    <div class="incident-empty">No summarized incidents yet</div>
  </div>
</div>

<!-- Incident modal -->
<div class="incident-modal" id="incident-modal">
  <div class="incident-panel">
    <div class="incident-modal-head">
      <div>
        <div class="incident-modal-kicker" id="incident-modal-kicker">Incident</div>
        <div class="incident-modal-title" id="incident-modal-title"></div>
      </div>
      <button class="icon-btn" id="incident-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="incident-status-controls" id="incident-status-controls"></div>
    <div class="incident-modal-error" id="incident-modal-error"></div>
    <div class="incident-modal-grid">
      <div class="incident-modal-row">
        <div class="incident-modal-label">Location</div>
        <div class="incident-modal-value" id="incident-modal-location"></div>
      </div>
      <div class="incident-modal-row">
        <div class="incident-modal-label">Agency</div>
        <div class="incident-modal-value" id="incident-modal-agency"></div>
      </div>
      <div class="incident-modal-row">
        <div class="incident-modal-label">Details</div>
        <div class="incident-modal-details" id="incident-modal-details"></div>
      </div>
      <div class="incident-modal-row">
        <div class="incident-modal-label">Action</div>
        <div class="incident-modal-value" id="incident-modal-action"></div>
      </div>
    </div>
  </div>
</div>

<!-- Share modal -->
<div class="share-modal" id="share-modal">
  <div class="share-panel">
    <div class="share-head">
      <div>
        <div class="share-kicker">Login QR Code</div>
        <div class="share-title" id="share-title">Loading…</div>
      </div>
      <button class="icon-btn" id="share-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="share-qr-wrap"><img class="share-qr" id="share-qr" src="" alt="QR code"></div>
    <div class="share-url" id="share-url"></div>
    <div class="share-meta" id="share-meta"></div>
    <div class="share-actions">
      <button class="btn-secondary" id="share-copy">Copy link</button>
      <select class="btn-secondary" id="share-for">
        <option value="">Loading users…</option>
      </select>
    </div>
  </div>
</div>

<!-- Summary dock -->
<div id="summary-dock">
  <div class="summary-dock-inner">
    <textarea class="summary-note" id="summary-note" rows="1" placeholder="Optional note for summary"></textarea>
    <div class="summary-btn-group">
      <button class="summary-run" id="summary-all" style="display:none;opacity:.7" title="Summarize entire log">All</button>
      <button class="summary-run" id="summary-run">Summarize</button>
    </div>
    <div class="summary-output" id="summary-output"></div>
  </div>
</div>

<script>
const APP_VERSION = 'v19';

// ── Auth ──────────────────────────────────────────────────────────────────────
let AUTH  = sessionStorage.getItem('p25_auth')  || '';
let TOKEN = sessionStorage.getItem('p25_token') || '';

function authHeader() {
  if (TOKEN) return { 'Authorization': 'Bearer ' + TOKEN };
  return AUTH ? { 'Authorization': 'Basic ' + AUTH } : {};
}

async function tryLogin(user, pass) {
  const creds = btoa(user + ':' + pass);
  const r = await fetch('/api/state', { headers: { 'Authorization': 'Basic ' + creds }, cache: 'no-store' });
  if (r.ok) {
    AUTH = creds;
    sessionStorage.setItem('p25_auth', AUTH);
    return { ok: true, data: await r.json() };
  }
  return { ok: false };
}

document.getElementById('login-btn').onclick = async () => {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const result = await tryLogin(user, pass);
  if (result.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('summary-dock').style.display = 'block';
    init(result.data);
    updateSummaryButtonCooldown();
    checkShareAccess();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
};

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// QR scan auto-login: /?token=...
(async () => {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');
  if (!urlToken) return;
  history.replaceState(null, '', window.location.pathname);
  const r = await fetch('/api/state', { headers: { 'Authorization': 'Bearer ' + urlToken }, cache: 'no-store' });
  if (r.ok) {
    TOKEN = urlToken;
    AUTH  = '';
    sessionStorage.setItem('p25_token', TOKEN);
    sessionStorage.removeItem('p25_auth');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('summary-dock').style.display = 'block';
    init(await r.json());
    updateSummaryButtonCooldown();
    checkShareAccess();
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'QR code expired or invalid';
    err.style.display = 'block';
  }
})();

// Auto-login if we have stored creds
if (AUTH || TOKEN) {
  (async () => {
    const r = await fetch('/api/state', { headers: authHeader(), cache: 'no-store' });
    if (r.ok) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('summary-dock').style.display = 'block';
      init(await r.json());
      updateSummaryButtonCooldown();
      checkShareAccess();
    } else {
      AUTH = ''; TOKEN = '';
      sessionStorage.removeItem('p25_auth');
      sessionStorage.removeItem('p25_token');
    }
  })();
}

// ── State ─────────────────────────────────────────────────────────────────────
let entries  = [];
let entriesLatest = [];
let incidents = [];
let filter   = 'all';
let currentView = 'feed';
let lastStateSig = '';
let lastFeedSig = '';
let lastIncidentSig = '';
let pollingStarted = false;
let summaryCooldownTimer = null;
let incidentSearch = '';
let incidentStatusFilter = 'open';
let selectedIncidentNumber = null;

// ── Render ────────────────────────────────────────────────────────────────────
function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function agencyLabel(agency) {
  return { police: 'POLICE', fire: 'FIRE', ems: 'EMS', other: 'OTHER' }[agency] || 'OTHER';
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const wasNearTop = feed.scrollTop < 24;
  const previousHeight = feed.scrollHeight;
  const previousTop = feed.scrollTop;
  const visible = entriesLatest.filter(entry =>
    filter === 'all' || entry.type === 'summary' || entry.agency === filter
  );

  if (!visible.length) {
    feed.dataset.newestId = '';
    feed.innerHTML = `
      <div class="empty-state" style="display:flex">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 20.25h.008v.008H12v-.008z"/>
        </svg>
        <div>No traffic yet</div>
        <div style="font-size:12px">Waiting for OP25 transmissions...</div>
      </div>`;
    return;
  }

  feed.dataset.newestId = visible[0]?.id || '';
  feed.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'feed-list';
  list.dataset.renderedAt = `${Date.now()}`;
  for (const entry of visible) {
    list.appendChild(entry.type === 'summary' ? makeSummaryCard(entry) : makeTxCard(entry));
  }
  feed.appendChild(list);
  if (wasNearTop) {
    feed.scrollTop = 0;
  } else {
    feed.scrollTop = previousTop + (feed.scrollHeight - previousHeight);
  }
}

function renderIncidents() {
  const pane = document.getElementById('incidents');
  const priorSearch = document.getElementById('incident-search');
  const restoreSearchFocus = document.activeElement === priorSearch;
  const searchStart = priorSearch?.selectionStart || 0;
  const searchEnd = priorSearch?.selectionEnd || searchStart;
  const visible = filterIncidents();
  const tools = document.createElement('div');
  tools.className = 'incident-tools';
  tools.innerHTML = `
    <input class="incident-search" id="incident-search" type="search" placeholder="Search incidents" value="${escAttr(incidentSearch)}">
    <div class="incident-status-tabs">
      ${incidentFilterButton('open', 'Open')}
      ${incidentFilterButton('active', 'Active')}
      ${incidentFilterButton('watch', 'Watch')}
      ${incidentFilterButton('stale', 'Stale')}
      ${incidentFilterButton('routine', 'Routine')}
      ${incidentFilterButton('clear', 'Clear')}
      ${incidentFilterButton('all', 'All')}
    </div>`;
  const board = document.createElement('div');
  board.className = 'incident-board';
  for (const incident of visible) {
    board.appendChild(makeIncidentCard(incident));
  }
  pane.innerHTML = '';
  pane.appendChild(tools);
  if (!incidents.length) {
    pane.insertAdjacentHTML('beforeend', '<div class="incident-empty">No summarized incidents yet</div>');
  } else if (!visible.length) {
    pane.insertAdjacentHTML('beforeend', '<div class="incident-empty">No incidents match this filter</div>');
  } else {
    pane.appendChild(board);
  }
  const search = document.getElementById('incident-search');
  search.oninput = e => {
    incidentSearch = e.target.value;
    renderIncidents();
    document.getElementById('incident-search')?.focus();
  };
  pane.querySelectorAll('.incident-status-tab').forEach(btn => {
    btn.onclick = () => {
      incidentStatusFilter = btn.dataset.incidentFilter;
      renderIncidents();
    };
  });
  if (restoreSearchFocus) {
    search.focus();
    search.setSelectionRange(searchStart, searchEnd);
  }
}

function incidentFilterButton(value, label) {
  return `<button class="incident-status-tab ${incidentStatusFilter === value ? 'active' : ''}" data-incident-filter="${value}">${label}</button>`;
}

function filterIncidents() {
  const q = incidentSearch.trim().toLowerCase();
  return incidents.filter(incident => {
    const kind = incident.status_kind || 'watch';
    const statusMatch =
      incidentStatusFilter === 'all' ||
      (incidentStatusFilter === 'open' && kind !== 'clear' && !incident.is_stale) ||
      (incidentStatusFilter === 'stale' && incident.is_stale) ||
      kind === incidentStatusFilter;
    if (!statusMatch) return false;
    if (!q) return true;
    const haystack = [
      incident.number,
      incident.title,
      incident.status,
      incident.agency,
      incident.location,
      incident.action,
      ...(incident.details || []),
    ].join(' ').toLowerCase();
    return haystack.includes(q);
  });
}

function makeIncidentCard(incident) {
  const card = document.createElement('div');
  const kind = incident.status_kind || 'watch';
  card.className = 'incident-card';
  card.dataset.kind = kind;
  card.dataset.stale = incident.is_stale ? 'true' : 'false';
  const statusClass = `status-${kind}`;
  const title = incident.number ? `#${incident.number} ${incident.title || 'Incident'}` : (incident.title || 'Incident');
  const details = (incident.details || []).slice(0, 5)
    .map(d => `<div class="incident-detail">${escHtml(d)}</div>`)
    .join('');
  const updated = escHtml(incident.last_seen || incident.summary_time || '');
  const updates = `${Number(incident.updates || 1)} update${Number(incident.updates || 1) === 1 ? '' : 's'}`;
  card.innerHTML = `
    <div class="incident-row-main">
      <div class="incident-card-title">${escHtml(title)}</div>
      <div class="incident-meta-row">
        <span class="incident-pill ${statusClass}">${escHtml(incident.status || 'WATCH')}</span>
        ${incident.is_stale ? '<span class="incident-pill status-stale">STALE</span>' : ''}
        <span class="incident-pill">${escHtml(incident.agency || 'Unknown')}</span>
      </div>
    </div>
    <div class="incident-subline">
      ${incident.location ? `<div class="incident-location">${mapLocationHtml(incident.location)}</div>` : ''}
      <span class="incident-agency">${escHtml(incident.agency || 'Unknown agency')}</span>
      <span class="incident-age">updated ${updated}</span>
      <span class="incident-age">${escHtml(updates)}</span>
    </div>
    <div class="incident-details">${details || '<div class="incident-detail">Awaiting a cleaner summary update.</div>'}</div>`;
  card.onclick = () => openIncidentModal(incident.number);
  card.querySelectorAll('a').forEach(a => a.onclick = e => e.stopPropagation());
  return card;
}

function makeTxCard(entry) {
  const card = document.createElement('div');
  card.className = 'tx-card';
  card.dataset.agency = entry.agency || 'other';
  card.dataset.id = entry.id || '';
  const text = entry.text || '';
  const long = text.length > 120;
  if (long) card.classList.add('has-more');
  card.innerHTML = `
    <div class="tx-card-inner">
      <div class="tx-meta">
        <span class="tg-badge" data-agency="${escHtml(entry.agency || 'other')}">${escHtml(entry.talkgroup || 'Unknown')}</span>
        <span class="tx-time">${escHtml(entry.time || '')}</span>
      </div>
      <div class="tx-text${long ? ' truncated' : ''}">${escHtml(text)}</div>
      ${long ? '<div class="tx-expand">tap to expand ↓</div>' : ''}
    </div>`;
  return card;
}

function makeSummaryCard(entry) {
  const card = document.createElement('div');
  card.className = 'summary-card';
  card.dataset.id = entry.id || '';
  card.innerHTML = `
    <div class="summary-header">
      <span class="summary-label">AI SUMMARY</span>
      <span class="summary-time">${escHtml(entry.time || '')}</span>
    </div>
    <div class="summary-text summary-md">${renderSummaryMarkdown(entry.text || '')}</div>`;
  return card;
}

function escHtml(t) {
  return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escAttr(t) {
  return escHtml(t).replace(/"/g,'&quot;');
}

function mapSearchUrl(text) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(text)}`;
}

function mapLocationHtml(text) {
  const safe = escHtml(text);
  return `<a class="map-link" href="${mapSearchUrl(text)}" target="_blank" rel="noopener noreferrer">${safe}</a>`;
}

function findIncident(number) {
  return incidents.find(i => Number(i.number) === Number(number));
}

function openIncidentModal(number) {
  selectedIncidentNumber = Number(number);
  const incident = findIncident(selectedIncidentNumber);
  if (!incident) return;
  const modal = document.getElementById('incident-modal');
  const title = incident.number ? `#${incident.number} ${incident.title || 'Incident'}` : (incident.title || 'Incident');
  document.getElementById('incident-modal-kicker').textContent = incident.is_stale ? `${incident.status || 'WATCH'} · STALE` : (incident.status || 'WATCH');
  document.getElementById('incident-modal-title').textContent = title;
  document.getElementById('incident-modal-location').innerHTML = incident.location ? mapLocationHtml(incident.location) : 'Unknown';
  document.getElementById('incident-modal-agency').textContent = incident.agency || 'Unknown';
  document.getElementById('incident-modal-action').textContent = incident.action || 'None';
  document.getElementById('incident-modal-details').innerHTML = (incident.details || [])
    .map(d => `<div class="incident-detail">${escHtml(d)}</div>`)
    .join('') || '<div class="incident-detail">No details recorded.</div>';
  document.getElementById('incident-modal-error').style.display = 'none';
  renderIncidentStatusControls(incident);
  modal.classList.add('open');
}

function renderIncidentStatusControls(incident) {
  const statuses = ['ACTIVE', 'PENDING', 'ROUTINE', 'CLEAR'];
  const current = String(incident.status || '').toUpperCase();
  const controls = document.getElementById('incident-status-controls');
  controls.innerHTML = statuses.map(status => `
    <button class="incident-status-control ${current.includes(status) ? 'active' : ''} ${status === 'CLEAR' ? 'clear-action' : ''}" data-status="${status}">
      ${status}
    </button>`).join('');
  controls.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => updateIncidentStatus(incident.number, btn.dataset.status);
  });
}

async function updateIncidentStatus(number, status) {
  const err = document.getElementById('incident-modal-error');
  err.style.display = 'none';
  try {
    const r = await fetch(`/api/incidents/${encodeURIComponent(number)}`, {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const updated = await r.json();
    incidents = incidents.map(i => Number(i.number) === Number(number) ? updated : i);
    renderIncidents();
    openIncidentModal(number);
    syncEntries();
  } catch (e) {
    err.textContent = 'Update failed: ' + e.message;
    err.style.display = 'block';
  }
}

document.getElementById('incident-close').onclick = () =>
  document.getElementById('incident-modal').classList.remove('open');
document.getElementById('incident-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('incident-modal'))
    document.getElementById('incident-modal').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('incident-modal').classList.remove('open');
    document.getElementById('share-modal').classList.remove('open');
  }
});

function renderInlineMarkdown(text) {
  return escHtml(text)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

function renderSummaryMarkdown(text) {
  const html = [];
  let list = [];
  const flushList = () => {
    if (!list.length) return;
    html.push(`<ul>${list.map(item => `<li>${item}</li>`).join('')}</ul>`);
    list = [];
  };

  for (const rawLine of text.split(/\r?\n/)) {
    const line = rawLine.trim();
    if (!line) {
      flushList();
      continue;
    }
    if (/^-{3,}$/.test(line)) {
      flushList();
      html.push('<hr>');
      continue;
    }
    const h = line.match(/^(#{1,3})\s+(.+)$/);
    if (h) {
      flushList();
      const level = h[1].length >= 3 ? 'h3' : 'h2';
      html.push(`<${level}>${renderInlineMarkdown(h[2])}</${level}>`);
      continue;
    }
    const bullet = line.match(/^[-*]\s+(.+)$/);
    if (bullet) {
      const item = bullet[1];
      const bulletLocation = item.match(/^(Location|Address)\s*:\s*(.+)$/i);
      if (bulletLocation) {
        list.push(`<strong>${escHtml(bulletLocation[1])}:</strong> ${mapLocationHtml(bulletLocation[2])}`);
      } else {
        list.push(renderInlineMarkdown(item));
      }
      continue;
    }
    flushList();
    const locationLine = line.match(/^(Location|Address)\s*:\s*(.+)$/i);
    if (locationLine) {
      const label = locationLine[1];
      const value = locationLine[2];
      html.push(`<p><strong>${escHtml(label)}:</strong> ${mapLocationHtml(value)}</p>`);
      continue;
    }
    const cls = /^(⚠|WARNING|UNRESOLVED|ACTION)/i.test(line) ? ' class="summary-alert"' : '';
    html.push(`<p${cls}>${renderInlineMarkdown(line)}</p>`);
  }
  flushList();
  return html.join('');
}

async function syncEntries() {
  const dot = document.getElementById('live-dot');
  const status = document.getElementById('update-status');
  try {
    const r = await fetch(`/api/state?ts=${Date.now()}`, {
      headers: authHeader(),
      cache: 'no-store',
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const state = await r.json();
    const latest = (state.entries || []).at(-1);
    const feedSig = JSON.stringify({
      count: (state.entries || []).length,
      latest: latest ? [latest.type, latest.time, latest.talkgroup || '', latest.text || ''] : [],
      log_size: state.log_size,
      log_mtime: state.log_mtime,
    });
    const incidentSig = JSON.stringify((state.incidents || []).map(i => [
      i.number, i.title, i.status, i.status_kind, i.location, i.last_seen, i.action, (i.details || []).join('|')
    ]));
    if (feedSig !== lastFeedSig) {
      entries = state.entries || [];
      entriesLatest = state.entries_latest || [...entries].reverse();
      lastFeedSig = feedSig;
      renderFeed();
    }
    if (incidentSig !== lastIncidentSig) {
      incidents = state.incidents || [];
      lastIncidentSig = incidentSig;
      renderIncidents();
      if (document.getElementById('incident-modal').classList.contains('open') && selectedIncidentNumber) {
        openIncidentModal(selectedIncidentNumber);
      }
    }
    dot.classList.remove('dead');
    const newest = (state.entries_latest || entriesLatest || [])[0];
    const newestLabel = newest ? `${newest.time} ${newest.text || newest.type}` : 'empty';
    status.textContent = `${APP_VERSION} · ${(state.entries || entries).length} · ${newestLabel}`;
    return true;
  } catch (e) {
    dot.classList.add('dead');
    status.textContent = `stale · ${e.message}`;
    return false;
  }
}

function startPolling() {
  if (pollingStarted) return;
  pollingStarted = true;
  setInterval(syncEntries, 2000);
}

function currentUsername() {
  if (TOKEN) {
    try {
      const part = TOKEN.split('.')[0].replace(/-/g, '+').replace(/_/g, '/');
      const padded = part + '='.repeat((4 - part.length % 4) % 4);
      return JSON.parse(atob(padded)).u || '';
    } catch (e) { return ''; }
  }
  try { return AUTH ? atob(AUTH).split(':', 1)[0] : ''; } catch (e) { return ''; }
}

function viewerCooldownKey() {
  return 'p25_viewer_summary_ready_at';
}

function updateSummaryButtonCooldown() {
  if (summaryCooldownTimer) {
    clearInterval(summaryCooldownTimer);
    summaryCooldownTimer = null;
  }
  const readyAt = Number(localStorage.getItem(viewerCooldownKey()) || 0);
  const remaining = Math.max(0, Math.ceil((readyAt - Date.now()) / 1000));
  const btn = document.getElementById('summary-run');
  if (!btn) return;
  if (currentUsername() !== 'viewer' || remaining <= 0) {
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = 'Summarize';
    return;
  }
  const tick = () => {
    const left = Math.max(0, Math.ceil((readyAt - Date.now()) / 1000));
    if (left <= 0) {
      localStorage.removeItem(viewerCooldownKey());
      updateSummaryButtonCooldown();
      return;
    }
    btn.disabled = true;
    btn.textContent = `Summarize (${Math.ceil(left / 60)}:${String(left % 60).padStart(2, '0')})`;
  };
  tick();
  summaryCooldownTimer = setInterval(tick, 1000);
}

// ── Filters ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    renderFeed();
  };
});

document.getElementById('feed').addEventListener('click', e => {
  const card = e.target.closest('.tx-card.has-more');
  if (!card) return;
  card.classList.toggle('expanded');
  card.querySelector('.tx-text')?.classList.toggle('truncated');
  const exp = card.querySelector('.tx-expand');
  if (exp) exp.textContent = card.classList.contains('expanded') ? 'tap to collapse' : 'tap to expand';
});

document.querySelectorAll('.view-tab').forEach(btn => {
  btn.onclick = () => {
    setView(btn.dataset.view, true);
  };
});

function setView(view, updateHash = false) {
  currentView = view === 'incidents' ? 'incidents' : 'feed';
  document.querySelectorAll('.view-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.view === currentView);
  });
  document.getElementById('feed').style.display = currentView === 'feed' ? 'block' : 'none';
  document.getElementById('incidents').style.display = currentView === 'incidents' ? 'block' : 'none';
  if (updateHash) location.hash = currentView === 'incidents' ? 'incidents' : '';
}

window.addEventListener('hashchange', () => setView(location.hash.slice(1)));

// ── Summary dock ──────────────────────────────────────────────────────────────
const summaryNote = document.getElementById('summary-note');
const summaryOut  = document.getElementById('summary-output');
const summaryRun  = document.getElementById('summary-run');

summaryNote.addEventListener('input', () => {
  summaryNote.style.height = 'auto';
  summaryNote.style.height = `${Math.min(summaryNote.scrollHeight, 88)}px`;
});

summaryRun.onclick = async () => {
  summaryRun.disabled = true;
  summaryRun.classList.add('running');
  summaryRun.textContent = 'Running';
  summaryOut.classList.remove('error');
  summaryOut.style.display = 'none';
  summaryOut.textContent = '';

  try {
    const resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: summaryNote.value.trim() }),
    });

    if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const payload = JSON.parse(line.slice(5).trim());
        if (payload.error) {
          summaryRun.classList.remove('running');
          summaryOut.classList.add('error');
          summaryOut.style.display = 'block';
          summaryOut.textContent = payload.error;
          if (payload.retry_after_seconds && currentUsername() === 'viewer') {
            localStorage.setItem(viewerCooldownKey(), `${Date.now() + (Number(payload.retry_after_seconds) * 1000)}`);
            updateSummaryButtonCooldown();
          } else {
            summaryRun.textContent = 'Summarize';
            summaryRun.disabled = false;
          }
          return;
        }
        if (payload.done) {
          await syncEntries();
          summaryNote.value = '';
          summaryNote.style.height = 'auto';
          summaryRun.classList.remove('running');
          summaryRun.textContent = 'Done';
          if (currentUsername() === 'viewer') {
            localStorage.setItem(viewerCooldownKey(), `${Date.now() + 15 * 60 * 1000}`);
            updateSummaryButtonCooldown();
          }
          setTimeout(() => {
            summaryRun.textContent = 'Summarize';
            if (currentUsername() !== 'viewer') summaryRun.disabled = false;
          }, 1200);
        }
      }
    }
  } catch (e) {
    summaryRun.classList.remove('running');
    summaryOut.classList.add('error');
    summaryOut.style.display = 'block';
    summaryOut.textContent = 'Error: ' + e.message;
    summaryRun.textContent = 'Summarize';
    summaryRun.disabled = false;
  }
};

document.getElementById('summary-all').onclick = async () => {
  const allBtn = document.getElementById('summary-all');
  allBtn.disabled = true;
  summaryRun.disabled = true;
  summaryRun.classList.add('running');
  summaryRun.textContent = 'Running';
  summaryOut.classList.remove('error');
  summaryOut.style.display = 'none';
  summaryOut.textContent = '';

  try {
    const resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: summaryNote.value.trim(), full: true }),
    });
    if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const payload = JSON.parse(line.slice(5).trim());
        if (payload.error) {
          summaryRun.classList.remove('running');
          summaryOut.classList.add('error');
          summaryOut.style.display = 'block';
          summaryOut.textContent = payload.error;
          summaryRun.textContent = 'Summarize';
          summaryRun.disabled = false;
          allBtn.disabled = false;
          return;
        }
        if (payload.text) {
          summaryOut.style.display = 'block';
          summaryOut.textContent += payload.text;
        }
        if (payload.done) {
          await syncEntries();
          summaryNote.value = '';
          summaryNote.style.height = 'auto';
          summaryRun.classList.remove('running');
          summaryRun.textContent = 'Done';
          setTimeout(() => { summaryRun.textContent = 'Summarize'; summaryRun.disabled = false; }, 1200);
          allBtn.disabled = false;
        }
      }
    }
  } catch (e) {
    summaryRun.classList.remove('running');
    summaryOut.classList.add('error');
    summaryOut.style.display = 'block';
    summaryOut.textContent = 'Error: ' + e.message;
    summaryRun.textContent = 'Summarize';
    summaryRun.disabled = false;
    allBtn.disabled = false;
  }
};

// ── Download logs ─────────────────────────────────────────────────────────────
document.getElementById('download-btn').onclick = async () => {
  const btn = document.getElementById('download-btn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/logs/download', { headers: authHeader() });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const blob = await r.blob();
    const disposition = r.headers.get('content-disposition') || '';
    const nameMatch = disposition.match(/filename="?([^"]+)"?/);
    const filename = nameMatch ? nameMatch[1] : 'p25_log.txt';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Download failed: ' + e.message);
  } finally {
    btn.disabled = false;
  }
};

// ── Live audio ────────────────────────────────────────────────────────────────
let _audioEl = null;

document.getElementById('audio-btn').onclick = async () => {
  const btn = document.getElementById('audio-btn');
  if (_audioEl) {
    _audioEl.pause();
    _audioEl.src = '';
    _audioEl = null;
    btn.style.color = '';
    btn.title = 'Listen live';
    return;
  }
  try {
    let token;
    if (typeof TOKEN !== 'undefined' && TOKEN) {
      token = TOKEN;
    } else {
      const r = await fetch('/api/audio/token', { headers: authHeader(), cache: 'no-store' });
      if (!r.ok) throw new Error('Could not get audio token');
      token = (await r.json()).token;
    }
    _audioEl = new Audio(`/api/audio?t=${encodeURIComponent(token)}`);
    _audioEl.onended = _audioEl.onerror = () => {
      _audioEl = null;
      btn.style.color = '';
      btn.title = 'Listen live';
    };
    await _audioEl.play();
    btn.style.color = 'var(--police)';
    btn.title = 'Stop listening';
  } catch (e) {
    alert('Audio failed: ' + e.message);
  }
};

// ── Share / QR ────────────────────────────────────────────────────────────────
let shareUsers = [];

async function checkShareAccess() {
  const r = await fetch('/api/users', { headers: authHeader(), cache: 'no-store' });
  const btn = document.getElementById('share-btn');
  const allBtn = document.getElementById('summary-all');
  if (r.ok) {
    shareUsers = await r.json();
    const sel = document.getElementById('share-for');
    sel.innerHTML = shareUsers.map(u => `<option value="${u.username}">${u.username}</option>`).join('');
    btn.style.display = '';
    allBtn.style.display = '';
  } else {
    btn.style.display = 'none';
    allBtn.style.display = 'none';
  }
}

document.getElementById('share-btn').onclick = async () => {
  const modal  = document.getElementById('share-modal');
  const qrImg  = document.getElementById('share-qr');
  const urlEl  = document.getElementById('share-url');
  const metaEl = document.getElementById('share-meta');
  const title  = document.getElementById('share-title');
  const copyBtn = document.getElementById('share-copy');
  const sel    = document.getElementById('share-for');
  modal.classList.add('open');
  qrImg.src = '';
  urlEl.textContent = 'Loading…';
  metaEl.textContent = '';
  try {
    const r = await fetch('/api/login/share', {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ ttl_seconds: 14 * 24 * 60 * 60, for_username: sel.value }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    qrImg.src  = data.qr_data_url;
    urlEl.textContent  = data.url;
    title.textContent  = `${data.username} · expires ${data.expires_at.slice(0, 10)}`;
    metaEl.textContent = 'Scan to log in. Valid for 2 weeks.';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(data.url).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy link'; }, 1500);
      });
    };
    sel.onchange = () => document.getElementById('share-btn').click();
  } catch (e) {
    urlEl.textContent = 'Error: ' + e.message;
  }
};

document.getElementById('share-close').onclick = () =>
  document.getElementById('share-modal').classList.remove('open');
document.getElementById('share-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('share-modal'))
    document.getElementById('share-modal').classList.remove('open');
});

// ── Init ──────────────────────────────────────────────────────────────────────
function init(data) {
  entries = Array.isArray(data) ? data : (data.entries || []);
  entriesLatest = Array.isArray(data) ? [...entries].reverse() : (data.entries_latest || [...entries].reverse());
  incidents = Array.isArray(data) ? [] : (data.incidents || []);
  const latest = entries.at(-1);
  lastFeedSig = JSON.stringify({
    count: entries.length,
    latest: latest ? [latest.type, latest.time, latest.talkgroup || '', latest.text || ''] : [],
    log_size: Array.isArray(data) ? 0 : data.log_size,
    log_mtime: Array.isArray(data) ? 0 : data.log_mtime,
  });
  lastIncidentSig = JSON.stringify(incidents.map(i => [
    i.number, i.title, i.status, i.status_kind, i.location, i.last_seen, i.action, (i.details || []).join('|')
  ]));
  lastStateSig = JSON.stringify({ feed: lastFeedSig, incidents: lastIncidentSig });
  renderFeed();
  renderIncidents();
  setView(location.hash.slice(1));
  startPolling();
  syncEntries();
}
