<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>P25 Monitor</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<link rel="apple-touch-icon" href="/icon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1e2530;
  --border:     #30363d;
  --text:       #e6edf3;
  --muted:      #7d8590;
  --police:     #3b82f6;
  --fire:       #ef4444;
  --ems:        #22c55e;
  --other:      #6b7280;
  --summary:    #f59e0b;
  --tippecanoe: #22d3ee;
  --safet:      #c084fc;
  --radius:     10px;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
             font-size: 14px; }

/* ── Login ── */
#login-screen { display: flex; align-items: center; justify-content: center;
                height: 100vh; }
.login-card { background: var(--surface); border: 1px solid var(--border);
              border-radius: var(--radius); padding: 32px; width: 320px;
              display: flex; flex-direction: column; gap: 16px; }
.login-card h1 { font-size: 20px; font-weight: 600; text-align: center; }
.login-card .logo { text-align: center; font-size: 48px; margin-bottom: 4px; }
.login-card input { background: var(--bg); border: 1px solid var(--border);
                    border-radius: 6px; padding: 10px 12px; color: var(--text);
                    font-size: 14px; width: 100%; }
.login-card input:focus { outline: none; border-color: var(--police); }
.btn-primary { background: var(--police); color: #fff; border: none;
               border-radius: 6px; padding: 11px; font-size: 14px;
               font-weight: 600; cursor: pointer; width: 100%; }
.btn-primary:hover { filter: brightness(1.15); }
.login-error { color: var(--fire); font-size: 13px; text-align: center; display: none; }

/* ── App shell ── */
#app { display: none; flex-direction: column; height: 100vh; }

header { background: var(--surface); border-bottom: 1px solid var(--border);
         padding: 0 16px; height: 52px; display: flex; align-items: center;
         gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; flex: 1; }
.header-title span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
.update-status { color: var(--muted); font-family: monospace; font-size: 11px; max-width: 280px;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ems);
            animation: pulse 2s infinite; }
.live-dot.dead { background: var(--fire); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.header-controls { display: flex; align-items: center; gap: 8px; }
.view-tabs { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border);
             border-radius: 8px; padding: 3px; }
.view-tab { background: transparent; border: 0; border-radius: 5px; color: var(--muted);
            cursor: pointer; font-size: 12px; font-weight: 700; padding: 5px 9px; }
.view-tab.active { background: var(--surface2); color: var(--text); }

.icon-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); width: 34px; height: 34px; display: inline-flex;
            align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.icon-btn:hover { border-color: var(--text); }
.icon-btn svg { width: 17px; height: 17px; }
.icon-group { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
.audio-ch-group { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.audio-ch-btn { background: var(--bg); border: none; border-left: 1px solid var(--border); color: var(--muted);
  font-size: 11px; font-weight: 700; padding: 0 9px; height: 33px; cursor: pointer; letter-spacing: .03em; }
.audio-ch-btn:first-child { border-left: none; }
.audio-ch-btn.active { background: var(--surface); color: var(--text); }
.audio-ch-btn:hover:not(.active) { background: rgba(255,255,255,.05); }

.filter-tabs { display: flex; gap: 4px; }
.filter-tab { background: none; border: 1px solid var(--border); border-radius: 20px;
              color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer;
              transition: all .15s; }
.filter-tab.active, .filter-tab:hover { color: var(--text); border-color: var(--text); }
.filter-tab[data-filter="police"].active      { color: var(--police);      border-color: var(--police);      }
.filter-tab[data-filter="fire"].active        { color: var(--fire);        border-color: var(--fire);        }
.filter-tab[data-filter="ems"].active         { color: var(--ems);         border-color: var(--ems);         }
.filter-tab[data-trunk="tippecanoe"].active   { color: var(--tippecanoe);  border-color: var(--tippecanoe);  }
.filter-tab[data-trunk="safet"].active        { color: var(--safet);       border-color: var(--safet);       }

.tx-card[data-trunk="tippecanoe"] { border-top: 2px solid var(--tippecanoe); }
.tx-card[data-trunk="safet"]      { border-top: 2px solid var(--safet); }

/* ── Feed ── */
#feed, #incidents { flex: 1; overflow-y: auto; padding: 12px 16px 180px; }
#incidents { display: none; }

.feed-list { display: grid; gap: 6px; }

/* ── TX card ── */
.tx-card { background: var(--surface); border: 1px solid var(--border);
           border-radius: var(--radius); margin-bottom: 6px; overflow: hidden;
           cursor: pointer; transition: border-color .15s, transform .1s; }
.tx-card:hover { border-color: var(--border); transform: translateY(-1px);
                 box-shadow: 0 4px 12px rgba(0,0,0,.4); }
.tx-card.expanded { border-color: var(--border); }
.tx-card[data-agency="police"] { border-left: 3px solid var(--police); }
.tx-card[data-agency="fire"]   { border-left: 3px solid var(--fire);   }
.tx-card[data-agency="ems"]    { border-left: 3px solid var(--ems);    }
.tx-card[data-agency="other"]  { border-left: 3px solid var(--other);  }

.tx-card-inner { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
.tx-meta { display: flex; align-items: center; gap: 8px; }
.tx-play-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 0 2px; line-height: 1; transition: color 0.15s; }
.tx-play-btn:hover { color: var(--text); }
.tx-play-btn.playing { color: var(--police); }
.tx-play-btn.loading { color: var(--muted); pointer-events: none; animation: spin .7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
#audio-ch-select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 11px; font-weight: 700; padding: 2px 4px; cursor: pointer; outline: none; }
#audio-btn.loading { pointer-events: none; animation: spin .7s linear infinite; }
#audio-btn.active { color: var(--police); border-color: var(--police); }
.tg-badge { font-size: 11px; font-weight: 600; border-radius: 4px; padding: 2px 7px; }
.tg-badge[data-agency="police"] { background: rgba(59,130,246,.2);  color: var(--police); }
.tg-badge[data-agency="fire"]   { background: rgba(239,68,68,.2);   color: var(--fire);   }
.tg-badge[data-agency="ems"]    { background: rgba(34,197,94,.2);   color: var(--ems);    }
.tg-badge[data-agency="other"]  { background: rgba(107,114,128,.2); color: var(--other);  }
.tx-time { font-size: 11px; color: var(--muted); font-family: monospace; margin-left: auto; }
.tx-text { font-size: 13px; line-height: 1.5; color: var(--text); }
.tx-text.truncated { display: -webkit-box; -webkit-line-clamp: 2;
                     -webkit-box-orient: vertical; overflow: hidden; }
.tx-expand { font-size: 11px; color: var(--muted); padding-top: 2px; display: none; }
.tx-card.has-more .tx-expand { display: block; }
.tx-card.expanded .tx-text { -webkit-line-clamp: unset; overflow: visible; }

/* ── Summary card ── */
.summary-card { background: rgba(245,158,11,.06); border: 1px solid rgba(245,158,11,.3);
                border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
.summary-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px 0; }
.summary-label { font-size: 11px; font-weight: 700; color: var(--summary);
                 letter-spacing: .5px; }
.summary-time { font-size: 11px; color: var(--muted); font-family: monospace;
                margin-left: auto; }
.summary-text { padding: 8px 14px 12px; font-size: 13px; line-height: 1.65;
                color: var(--text); }
.summary-md { display: grid; gap: 7px; }
.summary-md h2, .summary-md h3 { color: var(--text); font-size: 14px; line-height: 1.3;
                                 margin: 8px 0 2px; }
.summary-md h2:first-child, .summary-md h3:first-child { margin-top: 0; }
.summary-md p { margin: 0; }
.summary-md ul { margin: 0; padding-left: 18px; display: grid; gap: 4px; }
.summary-md li { padding-left: 2px; }
.summary-md strong { color: #fff; font-weight: 800; }
.summary-md hr { border: 0; border-top: 1px solid rgba(245,158,11,.28); margin: 4px 0; }
.summary-md .summary-alert { color: #fcd34d; font-weight: 700; }

/* ── Incident board ── */
.incident-tools { max-width: 980px; margin: 0 auto 10px; display: grid; gap: 6px; }
.incident-search, .feed-search { background: var(--surface); border: 1px solid var(--border);
                   border-radius: 8px; color: var(--text); font-size: 13px;
                   padding: 9px 10px; min-width: 0; width: 100%; }
.incident-search:focus, .feed-search:focus { outline: none; border-color: var(--police); }
.feed-search-wrap { padding: 8px 12px 0; max-width: 700px; display: flex; }
.filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
.filter-row-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted);
                  letter-spacing: .04em; min-width: 46px; }
.fck { background: var(--surface); color: var(--muted); border: 1px solid var(--border);
       border-radius: 999px; padding: 4px 10px; font-size: 11px;
       font-weight: 800; text-transform: uppercase; cursor: pointer; }
.fck.on { color: var(--text); border-color: var(--police); background: rgba(59,130,246,.12); }
.incident-board { max-width: 980px; margin: 0 auto; display: grid; gap: 8px; }
.incident-card { background: var(--surface); border: 1px solid var(--border);
                 border-left-width: 4px; border-radius: 8px; overflow: hidden;
                 padding: 10px 12px; display: grid; gap: 8px; cursor: pointer; }
.incident-card:hover { border-color: rgba(148,163,184,.42); background: rgba(31,41,55,.72); }
.incident-card[data-kind="active"] { border-left-color: var(--summary); }
.incident-card[data-kind="clear"] { border-left-color: var(--ems); opacity: .82; }
.incident-card[data-kind="routine"] { border-left-color: var(--other); }
.incident-card[data-kind="watch"] { border-left-color: var(--police); }
.incident-card[data-stale="true"] { opacity: .68; }
.incident-card[data-priority="1"] { border-top: 3px solid #a855f7; box-shadow: 0 -1px 6px rgba(168,85,247,.35); }
.incident-card[data-priority="2"] { border-top: 3px solid #ef4444; }
.incident-card[data-priority="3"] { border-top: 3px solid #eab308; }
.incident-card[data-priority="4"] { border-top: 3px solid #0ea5e9; }
.incident-card[data-priority="5"] { border-top: 3px solid #475569; }
.priority-badge { font-size: 10px; font-weight: 800; letter-spacing: .2px; border-radius: 3px; padding: 2px 5px; }
.priority-badge.p1 { background: rgba(168,85,247,.18); color: #c084fc; }
.priority-badge.p2 { background: rgba(239,68,68,.18);  color: #f87171; }
.priority-badge.p3 { background: rgba(234,179,8,.15);  color: #ca8a04; }
.priority-badge.p4 { background: rgba(14,165,233,.15); color: #0ea5e9; }
.priority-badge.p5 { background: rgba(71,85,105,.2);   color: #94a3b8; }

.incident-row-main { display: flex; align-items: flex-start; justify-content: space-between;
                     gap: 12px; min-width: 0; }
.incident-card-title { font-size: 15px; font-weight: 800; line-height: 1.25; }
.incident-meta-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
                     justify-content: flex-end; flex: 0 1 auto; }
.incident-pill { border: 1px solid var(--border); border-radius: 999px; color: var(--muted);
                 font-size: 10px; font-weight: 800; letter-spacing: .35px;
                 padding: 3px 7px; text-transform: uppercase; }
.incident-pill.status-active { border-color: rgba(245,158,11,.55); color: var(--summary); }
.incident-pill.status-clear { border-color: rgba(34,197,94,.55); color: var(--ems); }
.incident-pill.status-routine { border-color: rgba(107,114,128,.65); color: var(--muted); }
.incident-pill.status-stale { border-color: rgba(107,114,128,.65); color: var(--muted); }
.incident-subline { display: flex; flex-wrap: wrap; align-items: center; gap: 7px 12px;
                    color: var(--muted); font-size: 12px; min-width: 0; }
.incident-location { color: var(--text); font-size: 12px; line-height: 1.35; }
.incident-location a,
.summary-md a.map-link { color: #93c5fd; text-decoration: none; }
.incident-location a:hover,
.summary-md a.map-link:hover { text-decoration: underline; }
.incident-agency { color: var(--muted); font-size: 12px; }
.incident-age { color: var(--muted); font-family: monospace; font-size: 11px; }
.incident-details { border-top: 1px solid rgba(148,163,184,.14); padding-top: 8px;
                    display: grid; gap: 5px; font-size: 12px; line-height: 1.45; min-width: 0; }
.incident-detail { color: var(--text); }
.incident-detail::before { content: ""; display: inline-block; width: 5px; height: 5px;
                           border-radius: 50%; background: var(--summary);
                           margin: 0 7px 2px 0; opacity: .8; }
.incident-empty { color: var(--muted); text-align: center; padding: 70px 20px; }
.incident-log-link { color: var(--muted); font-size: 11px; font-family: monospace;
                     text-decoration: none; white-space: nowrap; }
.incident-log-link:hover { color: var(--text); }
@keyframes tx-flash {
  0%   { box-shadow: 0 0 0 2px rgba(245,158,11,.0); border-color: var(--summary); }
  18%  { box-shadow: 0 0 0 5px rgba(245,158,11,.45); border-color: var(--summary); }
  100% { box-shadow: 0 0 0 0 rgba(245,158,11,.0);  border-color: var(--border); }
}
.tx-card.jump-target, .incident-card.jump-target { animation: tx-flash 2.2s ease-out forwards; }
.tx-card.slice-dim { opacity: 0.18; transition: opacity 0.25s; }
.tx-card.slice-in  { opacity: 1; }
#slice-banner {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 7px 12px;
  background: rgba(15,23,42,.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--summary);
  font-size: 12px; color: var(--summary);
}
#slice-banner-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#slice-banner-clear { flex-shrink: 0; background: transparent; border: 1px solid currentColor;
  color: inherit; padding: 2px 9px; border-radius: 4px; cursor: pointer; font-size: 11px; }
#slice-banner-clear:hover { background: rgba(245,158,11,.15); }

.incident-modal { position: fixed; inset: 0; z-index: 45; display: none;
                  align-items: center; justify-content: center; padding: 18px;
                  background: rgba(0,0,0,.62); backdrop-filter: blur(6px); }
.incident-modal.open { display: flex; }
.incident-panel { width: min(720px, 100%); max-height: min(760px, 92vh); overflow-y: auto;
                  background: var(--surface); border: 1px solid var(--border);
                  border-radius: 12px; box-shadow: 0 24px 70px rgba(0,0,0,.55);
                  display: grid; gap: 14px; padding: 16px; }
.incident-modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.incident-modal-kicker { color: var(--summary); font-size: 11px; font-weight: 800;
                         letter-spacing: .5px; text-transform: uppercase; }
.incident-modal-title { font-size: 18px; font-weight: 800; line-height: 1.25; margin-top: 3px; }
.incident-modal-grid { display: grid; gap: 10px; }
.incident-modal-row { display: grid; gap: 4px; }
.incident-modal-label { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
.incident-modal-value { color: var(--text); font-size: 13px; line-height: 1.5; }
.incident-status-controls { display: flex; flex-wrap: wrap; gap: 7px; }
.incident-status-control { background: var(--surface2); border: 1px solid var(--border);
                           border-radius: 8px; color: var(--text); cursor: pointer;
                           font-size: 12px; font-weight: 800; padding: 8px 10px;
                           text-transform: uppercase; }
.incident-status-control.active { border-color: var(--summary); color: var(--summary); }
.incident-status-control.clear-action { border-color: rgba(34,197,94,.55); color: var(--ems); }
.incident-modal-details { display: grid; gap: 7px; }
.incident-modal-error { display: none; color: #fecaca; border: 1px solid rgba(239,68,68,.45);
                        background: rgba(127,29,29,.25); border-radius: 8px; padding: 9px 10px;
                        font-size: 12px; }

/* ── Summary dock ── */
#summary-dock { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
                display: none; background: rgba(13,17,23,.96);
                border-top: 1px solid var(--border); padding: 10px 12px;
                backdrop-filter: blur(8px); }
.summary-dock-inner { max-width: 860px; margin: 0 auto; display: grid;
                      grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
.summary-note { background: var(--surface); border: 1px solid var(--border);
                border-radius: 8px; color: var(--text); font-size: 13px;
                padding: 9px 10px; resize: none; min-height: 38px; max-height: 88px;
                width: 100%; font-family: inherit; line-height: 1.4; }
.summary-note:focus { outline: none; border-color: var(--summary); }
.summary-btn-group { display: flex; gap: 6px; align-items: end; }
.summary-run { background: var(--summary); color: #000; border: none;
               border-radius: 8px; padding: 0 14px; height: 38px;
               font-size: 13px; font-weight: 700; cursor: pointer;
               white-space: nowrap; }
.summary-run:hover { filter: brightness(1.08); }
.summary-run:disabled { opacity: .55; cursor: default; filter: none; }
.summary-run.running::before { content: ""; display: inline-block; width: 12px; height: 12px;
                               margin-right: 7px; border-radius: 50%;
                               border: 2px solid rgba(0,0,0,.28); border-top-color: #000;
                               vertical-align: -2px; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.summary-output { grid-column: 1 / -1; background: var(--surface);
                  border: 1px solid rgba(245,158,11,.35); border-radius: 8px;
                  color: var(--text); display: none; font-size: 13px;
                  line-height: 1.55; max-height: 140px; overflow-y: auto;
                  padding: 10px; white-space: pre-wrap; }
.summary-output.error { border-color: rgba(239,68,68,.5); color: #fecaca; }
/* ── Summary split-button dropdown ── */
.summary-split { position: relative; display: flex; }
.summary-split .summary-run:first-child { border-radius: 8px 0 0 8px; flex: 1; }
.summary-caret { border-radius: 0 8px 8px 0; padding: 0 10px; border-left: 1px solid rgba(0,0,0,.25) !important; }
.summary-dropdown-menu { position: absolute; bottom: calc(100% + 5px); right: 0;
                         background: var(--surface2); border: 1px solid var(--border);
                         border-radius: 8px; overflow: hidden; display: none;
                         min-width: 170px; box-shadow: 0 4px 16px rgba(0,0,0,.4); z-index: 30; }
.summary-dropdown-menu.open { display: block; }
.summary-dropdown-item { display: block; width: 100%; text-align: left;
                         background: none; border: none; color: var(--text);
                         padding: 10px 14px; cursor: pointer; font-size: 13px;
                         font-weight: 600; white-space: nowrap; }
.summary-dropdown-item:hover { background: var(--border); }

/* ── Share modal ── */
.share-modal { position: fixed; inset: 0; z-index: 40; display: none;
               align-items: center; justify-content: center; padding: 18px;
               background: rgba(0,0,0,.58); backdrop-filter: blur(6px); }
.share-modal.open { display: flex; }
.share-panel { width: min(440px, 100%); background: var(--surface);
               border: 1px solid var(--border); border-radius: 12px; padding: 16px;
               display: grid; gap: 14px; box-shadow: 0 24px 70px rgba(0,0,0,.55); }
.share-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.share-kicker { color: var(--summary); font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
.share-title { font-size: 16px; font-weight: 800; margin-top: 2px; }
.share-qr-wrap { background: #fff; border-radius: 12px; padding: 16px; display: flex; justify-content: center; }
.share-qr { width: 240px; height: 240px; image-rendering: pixelated; }
.share-url { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
             padding: 10px 12px; color: var(--text); font-size: 12px; line-height: 1.45;
             word-break: break-all; }
.share-meta { color: var(--muted); font-size: 12px; line-height: 1.45; }
.share-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border);
                 border-radius: 8px; padding: 9px 12px; font-size: 13px; font-weight: 700;
                 cursor: pointer; }
.btn-secondary:hover { border-color: var(--text); }

/* ── Empty state ── */
.empty-state { text-align: center; color: var(--muted); padding: 60px 20px;
               display: none; flex-direction: column; align-items: center; gap: 10px; }
.empty-state svg { opacity: .3; }

/* ── Map view ── */
#map-view { flex: 1; display: none; position: relative; min-height: 0; }
#leaflet-map { position: absolute; inset: 0; touch-action: none; }
.leaflet-locate-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 18px; width: 30px; height: 30px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; margin-top: 4px; }
.leaflet-locate-btn:hover { background: var(--border); }
.leaflet-locate-btn.tracking { color: #3b82f6; border-color: #3b82f6; }
.map-status-bar { position: absolute; bottom: 24px; right: 8px; z-index: 1000;
                  background: rgba(13,17,23,.88); border: 1px solid var(--border);
                  border-radius: 6px; color: var(--muted); font-size: 11px;
                  padding: 4px 8px; pointer-events: none; }
.map-filter-bar { position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
                  z-index: 1000; display: flex; gap: 6px; align-items: center;
                  background: rgba(13,17,23,.88); border: 1px solid var(--border);
                  border-radius: 8px; padding: 5px 8px; }
.map-filter-btn { background: none; border: 1px solid var(--border); border-radius: 14px;
                  color: var(--muted); font-size: 11px; font-weight: 600; padding: 2px 9px;
                  cursor: pointer; white-space: nowrap; transition: all .15s; }
.map-filter-btn.active { background: rgba(59,130,246,.18); border-color: var(--police);
                          color: var(--text); }
.map-filter-btn.dimmed { opacity: .35; pointer-events: none; }
.map-filter-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
.leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border);
                                  color: var(--text); border-radius: var(--radius); }
.leaflet-popup-tip { background: var(--surface); }
.leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
.map-popup-title { font-weight: 700; margin-bottom: 4px; }
.map-popup-sub { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
.map-popup-btn { background: var(--police); color: #fff; border: none; border-radius: 5px;
                 padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }

@media (max-width: 640px) {
  header { align-items: stretch; flex-wrap: wrap; height: auto; padding: 8px 10px; }
  .header-title { min-width: 180px; }
  .update-status { margin-left: auto; }
  .header-controls { order: 3; width: 100%; display: grid; grid-template-columns: minmax(0, 1fr) auto auto; }
  .view-tabs { min-width: 132px; }
  .view-tab { flex: 1; }
  .filter-tabs { overflow-x: auto; }
  #feed, #incidents { padding: 10px 10px 220px; }
  .incident-tools { display: grid; }
  .incident-row-main { display: grid; gap: 7px; }
  .incident-meta-row { justify-content: flex-start; }
  .summary-dock-inner { grid-template-columns: 1fr; }
  .summary-run { width: 100%; }
  .summary-split { width: 100%; }
  .summary-split .summary-run:first-child { flex: 1; }
}
</style>
</head>
<body>

<script>
const APP_VERSION = 'v40';

// ── Auth ──────────────────────────────────────────────────────────────────────
let AUTH  = sessionStorage.getItem('p25_auth')  || '';
let TOKEN = sessionStorage.getItem('p25_token') || '';

function authHeader() {
  if (TOKEN) return { 'Authorization': 'Bearer ' + TOKEN };
  return AUTH ? { 'Authorization': 'Basic ' + AUTH } : {};
}

async function tryLogin(user, pass) {
  const creds = btoa(user + ':' + pass);
  const r = await fetch('/api/state', { headers: { 'Authorization': 'Basic ' + creds }, cache: 'no-store' });
  if (r.ok) {
    AUTH = creds;
    sessionStorage.setItem('p25_auth', AUTH);
    return { ok: true, data: await r.json() };
  }
  return { ok: false };
}

document.getElementById('login-btn').onclick = async () => {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const result = await tryLogin(user, pass);
  if (result.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('summary-dock').style.display = 'block';
    init(result.data);
    updateSummaryButtonCooldown();
    checkShareAccess();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
};

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// QR scan auto-login: /?token=...
(async () => {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');
  if (!urlToken) return;
  history.replaceState(null, '', window.location.pathname);
  const r = await fetch('/api/state', { headers: { 'Authorization': 'Bearer ' + urlToken }, cache: 'no-store' });
  if (r.ok) {
    TOKEN = urlToken;
    AUTH  = '';
    sessionStorage.setItem('p25_token', TOKEN);
    sessionStorage.removeItem('p25_auth');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('summary-dock').style.display = 'block';
    init(await r.json());
    updateSummaryButtonCooldown();
    checkShareAccess();
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'QR code expired or invalid';
    err.style.display = 'block';
  }
})();

// Auto-login if we have stored creds
if (AUTH || TOKEN) {
  (async () => {
    const r = await fetch('/api/state', { headers: authHeader(), cache: 'no-store' });
    if (r.ok) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('summary-dock').style.display = 'block';
      init(await r.json());
      updateSummaryButtonCooldown();
      checkShareAccess();
    } else {
      AUTH = ''; TOKEN = '';
      sessionStorage.removeItem('p25_auth');
      sessionStorage.removeItem('p25_token');
    }
  })();
}

// ── State ─────────────────────────────────────────────────────────────────────
let isPrimaryUser = false;
let entries  = [];
let entriesLatest = [];
let incidents = [];
let filter      = 'all';
let trunkFilter = 'all';
let currentView = 'feed';
let _sliceIncident = null;
let lastStateSig = '';
let lastFeedSig = '';
let lastIncidentSig = '';
let pollingStarted = false;
let summaryCooldownTimer = null;
let feedSearch = '';
let incidentSearch = '';
let incidentFilter = 'now';  // 'critical' | 'now' | '8hr' | 'all' — matches iOS map filter

let selectedIncidentNumber = null;

// ── Render ────────────────────────────────────────────────────────────────────
function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function agencyLabel(agency) {
  return { police: 'POLICE', fire: 'FIRE', ems: 'EMS', other: 'OTHER' }[agency] || 'OTHER';
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const wasNearTop = feed.scrollTop < 24;
  const previousHeight = feed.scrollHeight;
  const previousTop = feed.scrollTop;
  const feedQ = feedSearch.trim().toLowerCase();
  const visible = entriesLatest.filter(entry => {
    if (filter !== 'all' && entry.type !== 'summary' && entry.agency !== filter) return false;
    if (trunkFilter !== 'all' && entry.type !== 'summary' && entry.trunk !== trunkFilter) return false;
    if (feedQ && entry.type === 'tx') {
      const hay = [entry.talkgroup, entry.text, entry.agency, entry.time].join(' ').toLowerCase();
      if (!hay.includes(feedQ)) return false;
    }
    return true;
  });

  if (!visible.length) {
    feed.dataset.newestId = '';
    feed.innerHTML = `
      <div class="empty-state" style="display:flex">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 20.25h.008v.008H12v-.008z"/>
        </svg>
        <div>No traffic yet</div>
        <div style="font-size:12px">Waiting for OP25 transmissions...</div>
      </div>`;
    return;
  }

  feed.dataset.newestId = visible[0]?.id || '';
  feed.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'feed-list';
  list.dataset.renderedAt = `${Date.now()}`;
  for (const entry of visible) {
    list.appendChild(entry.type === 'summary' ? makeSummaryCard(entry) : makeTxCard(entry));
  }
  feed.appendChild(list);
  if (wasNearTop) {
    feed.scrollTop = 0;
  } else {
    feed.scrollTop = previousTop + (feed.scrollHeight - previousHeight);
  }
  _applySlice();
}

function renderIncidents() {
  const pane = document.getElementById('incidents');
  const priorSearch = document.getElementById('incident-search');
  const restoreSearchFocus = document.activeElement === priorSearch;
  const searchStart = priorSearch?.selectionStart || 0;
  const searchEnd = priorSearch?.selectionEnd || searchStart;
  const visible = filterIncidents();
  const tools = document.createElement('div');
  const _if = (v, lbl) => `<button class="fck ${incidentFilter === v ? 'on' : ''}" data-if="${v}">${lbl}</button>`;
  tools.className = 'incident-tools';
  tools.innerHTML = `
    <input class="incident-search" id="incident-search" type="search" placeholder="Search incidents" value="${escAttr(incidentSearch)}">
    <div class="filter-row">
      ${_if('critical','Critical')}${_if('now','Now')}${_if('8hr','8hr')}${_if('all','All')}
    </div>`;
  const board = document.createElement('div');
  board.className = 'incident-board';
  for (const incident of visible) {
    board.appendChild(makeIncidentCard(incident));
  }
  pane.innerHTML = '';
  pane.appendChild(tools);
  if (!incidents.length) {
    pane.insertAdjacentHTML('beforeend', '<div class="incident-empty">No summarized incidents yet</div>');
  } else if (!visible.length) {
    pane.insertAdjacentHTML('beforeend', '<div class="incident-empty">No incidents match this filter</div>');
  } else {
    pane.appendChild(board);
  }
  const search = document.getElementById('incident-search');
  search.oninput = e => {
    incidentSearch = e.target.value;
    renderIncidents();
    document.getElementById('incident-search')?.focus();
  };
  pane.querySelectorAll('[data-if]').forEach(btn => {
    btn.onclick = () => {
      incidentFilter = btn.dataset.if;
      renderIncidents();
    };
  });

  if (restoreSearchFocus) {
    search.focus();
    search.setSelectionRange(searchStart, searchEnd);
  }
}


function _incidentAgencyKind(agency) {
  const a = (agency || '').toLowerCase();
  if (/fire|lfd|wlfd|tcfd|pufd/.test(a)) return 'fire';
  if (/ems|teas|medic|ambulance/.test(a)) return 'ems';
  if (/police|sheriff|lpd|wlpd|pupd|tcsd|isp|state police/.test(a)) return 'police';
  return 'other';
}

function _incidentTrunkKind(agency) {
  const a = (agency || '').toLowerCase();
  return /\bisp\b|indot/.test(a) ? 'safet' : 'tippecanoe';
}

function _within8hr(incident) {
  const raw = incident.first_seen || '';
  let d = null;
  if (/^\d{4}-\d{2}-\d{2} /.test(raw)) d = new Date(raw.replace(' ', 'T'));
  else if (/^\d{2}:\d{2}:\d{2}$/.test(raw)) {
    d = new Date();
    const [h, m, s] = raw.split(':').map(Number);
    d.setHours(h, m, s, 0);
    if (d > Date.now() + 5 * 60 * 1000) d.setDate(d.getDate() - 1);
  }
  return d && !isNaN(d) && (Date.now() - d.getTime()) <= 8 * 3600 * 1000;
}

function filterIncidents() {
  const q = incidentSearch.trim().toLowerCase();
  let result = incidents.filter(incident => {
    const kind = incident.status_kind || 'active';
    const prio = incident.priority || 3;
    const statusMatch =
      incidentFilter === 'critical' ? (kind !== 'clear' && prio <= 2) :
      incidentFilter === 'now'      ? kind !== 'clear' :
      incidentFilter === '8hr'      ? (kind !== 'clear' || _within8hr(incident)) :
                                      true;  // 'all'
    if (!statusMatch) return false;
    if (filter !== 'all' && _incidentAgencyKind(incident.agency) !== filter) return false;
    if (trunkFilter !== 'all' && _incidentTrunkKind(incident.agency) !== trunkFilter) return false;
    if (!q) return true;
    const haystack = [
      incident.number, incident.title, incident.status,
      incident.agency, incident.location, incident.action,
      ...(incident.details || []),
    ].join(' ').toLowerCase();
    return haystack.includes(q);
  });
  const sw = {active: 0, routine: 1, clear: 2};
  result = [...result].sort((a, b) => {
    const pa = a.priority || 3, pb = b.priority || 3;
    if (pa !== pb) return pa - pb;
    const wa = a.is_stale ? 2.5 : (sw[a.status_kind] ?? 2);
    const wb = b.is_stale ? 2.5 : (sw[b.status_kind] ?? 2);
    return wa - wb;
  });
  return result;
}

function priorityBadgeHtml(p) {
  const labels = {1:'Critical',2:'Serious',3:'Moderate',4:'Minor',5:'Routine'};
  const cls = p >= 1 && p <= 5 ? `p${p}` : 'p3';
  return `<span class="priority-badge ${cls}">P${p}</span>`;
}

function makeIncidentCard(incident) {
  const card = document.createElement('div');
  const kind = incident.status_kind || 'active';
  const prio = incident.priority || 3;
  card.className = 'incident-card';
  card.dataset.kind = kind;
  card.dataset.stale = incident.is_stale ? 'true' : 'false';
  card.dataset.priority = prio;
  card.dataset.number = incident.number;
  const statusClass = `status-${kind}`;
  const title = incident.number ? `#${incident.number} ${incident.title || 'Incident'}` : (incident.title || 'Incident');
  const details = (incident.details || []).slice(0, 5)
    .map(d => `<div class="incident-detail">${escHtml(d)}</div>`)
    .join('');
  const updated = escHtml(incident.last_seen || incident.summary_time || '');
  const updates = `${Number(incident.updates || 1)} update${Number(incident.updates || 1) === 1 ? '' : 's'}`;
  const hasTxAnchor = (incident.first_tx_id || 0) > 0;
  card.innerHTML = `
    <div class="incident-row-main">
      <div class="incident-card-title">${escHtml(title)}</div>
      <div class="incident-meta-row">
        ${priorityBadgeHtml(prio)}
        <span class="incident-pill ${statusClass}">${escHtml(incident.status || 'WATCH')}</span>

function escHtml(t) {
  return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escAttr(t) {
  return escHtml(t).replace(/"/g,'&quot;');
}

function mapSearchUrl(text) {

function mapLocationHtml(text, incidentNumber) {
  const safe = escHtml(text);
  if (incidentNumber != null) {
    const inc = findIncident(incidentNumber);
    if (inc && inc.lat != null && inc.lng != null) {
      return `<a class="map-link" href="javascript:void(0)" onclick="goToIncidentOnMap(${Number(incidentNumber)})">${safe}</a>`;
    }
  }
  return `<a class="map-link" href="${mapSearchUrl(text)}" target="_blank" rel="noopener noreferrer">${safe}</a>`;
}

function renderInlineMarkdown(text) {
  const linkRe = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g;
  let out = '', last = 0, m;
  while ((m = linkRe.exec(text)) !== null) {
    out += escHtml(text.slice(last, m.index));
    out += `<a href="${escAttr(m[2])}" target="_blank" rel="noopener">${escHtml(m[1])}</a>`;
    last = m.index + m[0].length;
  }
  out += escHtml(text.slice(last));
  return out
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

function renderSummaryMarkdown(text) {
  const html = [];
  let list = [];
  const flushList = () => {
    if (!list.length) return;
    html.push(`<ul>${list.map(item => `<li>${item}</li>`).join('')}</ul>`);
    list = [];
  };

  for (const rawLine of text.split(/\r?\n/)) {
    const line = rawLine.trim();
    if (!line) {
      flushList();
      continue;
    }
    if (/^-{3,}$/.test(line)) {
      flushList();
      html.push('<hr>');
      continue;
    }
    const h = line.match(/^(#{1,3})\s+(.+)$/);
    if (h) {
      flushList();
      const level = h[1].length >= 3 ? 'h3' : 'h2';
      html.push(`<${level}>${renderInlineMarkdown(h[2])}</${level}>`);
      continue;
    }
    const bullet = line.match(/^[-*]\s+(.+)$/);
    if (bullet) {
      const item = bullet[1];
      const bulletLocation = item.match(/^(Location|Address)\s*:\s*(.+)$/i);
      if (bulletLocation) {
        list.push(`<strong>${escHtml(bulletLocation[1])}:</strong> ${mapLocationHtml(bulletLocation[2])}`);
      } else {
        list.push(renderInlineMarkdown(item));
      }
      continue;
    }
    flushList();
    const locationLine = line.match(/^(Location|Address)\s*:\s*(.+)$/i);
    if (locationLine) {
      const label = locationLine[1];
      const value = locationLine[2];
      html.push(`<p><strong>${escHtml(label)}:</strong> ${mapLocationHtml(value)}</p>`);
      continue;
    }
    const cls = /^(⚠|WARNING|UNRESOLVED|ACTION)/i.test(line) ? ' class="summary-alert"' : '';
    html.push(`<p${cls}>${renderInlineMarkdown(line)}</p>`);
  }
  flushList();
  return html.join('');
}

async function syncEntries() {
  const dot = document.getElementById('live-dot');
  const status = document.getElementById('update-status');
  try {
    const r = await fetch(`/api/state?ts=${Date.now()}`, {
      headers: authHeader(),
      cache: 'no-store',
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const state = await r.json();
    const latest = (state.entries || []).at(-1);
    const feedSig = JSON.stringify({
      count: (state.entries || []).length,
      latest: latest ? [latest.type, latest.time, latest.talkgroup || '', latest.text || ''] : [],
      log_size: state.log_size,
      log_mtime: state.log_mtime,
    });
    const incidentSig = JSON.stringify((state.incidents || []).map(i => [
      i.number, i.title, i.status, i.status_kind, i.location, i.last_seen, i.action, (i.details || []).join('|')
    ]));
    if (feedSig !== lastFeedSig) {
      entries = state.entries || [];
      entriesLatest = state.entries_latest || [...entries].reverse();
      lastFeedSig = feedSig;
      renderFeed();
    }
    if (incidentSig !== lastIncidentSig) {
      incidents = state.incidents || [];
      lastIncidentSig = incidentSig;
      renderIncidents();
      if (currentView === 'map') renderMap();
      if (document.getElementById('incident-modal').classList.contains('open') && selectedIncidentNumber) {
        openIncidentModal(selectedIncidentNumber);
      }
    }
    dot.classList.remove('dead');
    const newest = (state.entries_latest || entriesLatest || [])[0];
    const newestLabel = newest ? `${newest.time} ${newest.text || newest.type}` : 'empty';
    status.textContent = `${APP_VERSION} · ${(state.entries || entries).length} · ${newestLabel}`;
    return true;
  } catch (e) {
    dot.classList.add('dead');
    status.textContent = `stale · ${e.message}`;
    return false;
  }
}

let _sseAbort     = null;
let _sseSyncTimer = null;

function _scheduleSync() {
  if (_sseSyncTimer) return;
  _sseSyncTimer = setTimeout(() => { _sseSyncTimer = null; syncEntries(); }, 400);
}

async function startSSE() {
  if (_sseAbort) return;
  const ctrl = new AbortController();
  _sseAbort = ctrl;
  try {
    const resp = await fetch('/api/stream', { headers: authHeader(), signal: ctrl.signal });
    if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);
    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        try {
          const ev = JSON.parse(line.slice(5).trim());
          if (ev.type === 'tx') _scheduleSync();
        } catch(_) {}
      }
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      _sseAbort = null;
      setTimeout(startSSE, 8000);
    }
  }
}

function startPolling() {
  if (pollingStarted) return;
  pollingStarted = true;
  startSSE();
  setInterval(syncEntries, 30000);  // fallback in case SSE is quiet
}

function currentUsername() {
  if (TOKEN) {
    try {
      const part = TOKEN.split('.')[0].replace(/-/g, '+').replace(/_/g, '/');
      const padded = part + '='.repeat((4 - part.length % 4) % 4);
      return JSON.parse(atob(padded)).u || '';
    } catch (e) { return ''; }
  }
  try { return AUTH ? atob(AUTH).split(':', 1)[0] : ''; } catch (e) { return ''; }
}

function viewerCooldownKey() {
  return 'p25_viewer_summary_ready_at';
}

function updateSummaryButtonCooldown() {
  if (summaryCooldownTimer) {
    clearInterval(summaryCooldownTimer);
    summaryCooldownTimer = null;
  }
  const readyAt = Number(localStorage.getItem(viewerCooldownKey()) || 0);
  const remaining = Math.max(0, Math.ceil((readyAt - Date.now()) / 1000));
  const btn = document.getElementById('summary-run');
  if (!btn) return;
  if (currentUsername() !== 'viewer' || remaining <= 0) {
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = 'Generate Summary';
    return;
  }
  const tick = () => {
    const left = Math.max(0, Math.ceil((readyAt - Date.now()) / 1000));
    if (left <= 0) {
      localStorage.removeItem(viewerCooldownKey());
      updateSummaryButtonCooldown();
      return;
    }
    btn.disabled = true;
    btn.textContent = `Generate Summary (${Math.ceil(left / 60)}:${String(left % 60).padStart(2, '0')})`;
  };
  tick();
  summaryCooldownTimer = setInterval(tick, 1000);
}

function _applySlice() {
  const feed = document.getElementById('feed');

    document.querySelectorAll('.tx-card').forEach(c => c.classList.remove('slice-dim', 'slice-in'));
    if (banner) banner.remove();
    return;
  }
  const { first_tx_id, last_tx_id, number, title } = _sliceIncident;
  const end = last_tx_id || first_tx_id;
  document.querySelectorAll('.tx-card[data-id]').forEach(card => {
    const txId = parseInt(card.dataset.id.replace('tx-', ''), 10);
    const inSlice = txId >= first_tx_id && txId <= end;
    card.classList.toggle('slice-in',  inSlice);
    card.classList.toggle('slice-dim', !inSlice);
  });
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'slice-banner';
    banner.innerHTML = `<span id="slice-banner-label">Showing window for Incident #${number}: ${escHtml(title || '')}</span>`
      + `<button id="slice-banner-clear">× Clear</button>`;
    feed.parentNode.insertBefore(banner, feed);
    document.getElementById('slice-banner-clear').onclick = _clearSlice;
  }
}

function jumpToLogEntry(incident) {
  _sliceIncident = (incident.first_tx_id > 0) ? incident : null;
  setView('feed');
  renderFeed();
  _applySlice();
  if (!incident.first_tx_id) return;
  const target = entries.find(e => e.id === `tx-${incident.first_tx_id}`);
  if (!target) return;
  requestAnimationFrame(() => {
    const el = document.querySelector(`.tx-card[data-id="${CSS.escape(String(target.id))}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const flash = () => { el.classList.remove('jump-target'); void el.offsetWidth; el.classList.add('jump-target'); };
    const obs = new IntersectionObserver((es, o) => { if (es[0].isIntersecting) { o.disconnect(); flash(); } }, { threshold: 0.5 });
    obs.observe(el);
    setTimeout(() => { obs.disconnect(); flash(); }, 1500);
  });
}

const summaryNote = document.getElementById('summary-note');
const summaryOut  = document.getElementById('summary-output');
const summaryRun  = document.getElementById('summary-run');

summaryNote.addEventListener('input', () => {
  summaryNote.style.height = 'auto';
  summaryNote.style.height = `${Math.min(summaryNote.scrollHeight, 88)}px`;
});

summaryRun.onclick = async () => {
  summaryRun.disabled = true;
  summaryRun.classList.add('running');
  summaryRun.textContent = 'Running';
  summaryOut.classList.remove('error');
  summaryOut.style.display = 'none';
  summaryOut.textContent = '';

  try {
    const resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: summaryNote.value.trim() }),
    });

    if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const payload = JSON.parse(line.slice(5).trim());
        if (payload.error) {
          summaryRun.classList.remove('running');
          summaryOut.classList.add('error');
          summaryOut.style.display = 'block';
          summaryOut.textContent = payload.error;
          if (payload.retry_after_seconds && currentUsername() === 'viewer') {
            localStorage.setItem(viewerCooldownKey(), `${Date.now() + (Number(payload.retry_after_seconds) * 1000)}`);
            updateSummaryButtonCooldown();
          } else {
            summaryRun.textContent = 'Generate Summary';
            summaryRun.disabled = false;
          }
          return;
        }
        if (payload.done) {
          await syncEntries();
          summaryNote.value = '';
          summaryNote.style.height = 'auto';
          summaryRun.classList.remove('running');
          summaryRun.textContent = 'Done';
          if (currentUsername() === 'viewer') {
            localStorage.setItem(viewerCooldownKey(), `${Date.now() + 15 * 60 * 1000}`);
            updateSummaryButtonCooldown();
          }
          setTimeout(() => {
            summaryRun.textContent = 'Generate Summary';
            if (currentUsername() !== 'viewer') summaryRun.disabled = false;
          }, 1200);
        }
      }
    }
  } catch (e) {
    summaryRun.classList.remove('running');
    summaryOut.classList.add('error');
    summaryOut.style.display = 'block';
    summaryOut.textContent = 'Error: ' + e.message;
    summaryRun.textContent = 'Generate Summary';
    summaryRun.disabled = false;
  }
};

  };

  try {
    const resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: summaryNote.value.trim(), ...params }),
    });
    if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const payload = JSON.parse(line.slice(5).trim());
        if (payload.error) {
          summaryOut.classList.add('error');
          summaryOut.style.display = 'block';
          summaryOut.textContent = payload.error;
          reset();
          return;
        }
        if (payload.text) {
          summaryOut.style.display = 'block';
          summaryOut.textContent += payload.text;
        }
        if (payload.done) {
          await syncEntries();
          summaryNote.value = '';
          summaryNote.style.height = 'auto';
          summaryRun.classList.remove('running');
          summaryRun.textContent = 'Done';
          setTimeout(reset, 1200);
        }
      }
    }
  } catch (e) {
    summaryOut.classList.add('error');
    summaryOut.style.display = 'block';
    summaryOut.textContent = 'Error: ' + e.message;
    reset();
  }
}

// ── Download logs ─────────────────────────────────────────────────────────────
document.getElementById('download-btn').onclick = async () => {
  const btn = document.getElementById('download-btn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/logs/download', { headers: authHeader() });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const blob = await r.blob();
    const disposition = r.headers.get('content-disposition') || '';
    const nameMatch = disposition.match(/filename="?([^"]+)"?/);
    const filename = nameMatch ? nameMatch[1] : 'p25_log.txt';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Download failed: ' + e.message);
  } finally {
    btn.disabled = false;
  }
};

// ── Live audio ────────────────────────────────────────────────────────────────
let _audioEl = null;
let _audioLoading = false;

document.getElementById('audio-btn').onclick = async () => {
  const btn = document.getElementById('audio-btn');
  if (_audioLoading) return;
  if (_audioEl) {
    _audioEl.pause();
    _audioEl.src = '';
    _audioEl = null;
    btn.classList.remove('active');
    btn.title = 'Listen live';
    return;
  }
  _audioLoading = true;
  btn.classList.add('loading');
  btn.title = 'Connecting…';
  try {
    let token;
    if (typeof TOKEN !== 'undefined' && TOKEN) {
      token = TOKEN;
    } else {
      const r = await fetch('/api/audio/token', { headers: authHeader(), cache: 'no-store' });
      if (!r.ok) throw new Error('Could not get audio token');
      token = (await r.json()).token;
    }
    _audioEl = new Audio(`/api/audio?t=${encodeURIComponent(token)}`);
    _audioEl.onended = _audioEl.onerror = () => {
      _audioEl = null;
      btn.classList.remove('active');
      btn.title = 'Listen live';
    };
    await _audioEl.play();
    btn.classList.add('active');
    btn.title = 'Stop listening';
  } catch (e) {
    btn.classList.remove('active');
    btn.title = 'Listen live';
    console.error('Audio failed:', e);
  } finally {
    _audioLoading = false;
    btn.classList.remove('loading');
  }
};

// ── Audio clip playback ───────────────────────────────────────────────────────
let _clipEl = null;
let _clipBtn = null;
let _clipLoading = false;

function _clipReset(btn) {
  if (btn) { btn.textContent = '▶'; btn.classList.remove('playing', 'loading'); }
}

async function playClip(filename, btn) {
  if (_clipLoading) return;
  if (_clipEl && !_clipEl.ended) {
    _clipEl.pause();
    _clipEl = null;
    const prev = _clipBtn;
    _clipBtn = null;
    _clipReset(prev);
    if (btn === prev) return;
  }
  _clipLoading = true;
  _clipBtn = btn;
  btn.textContent = '◌';
  btn.classList.add('loading');
  try {
    const tr = await fetch('/api/audio/token', { headers: authHeader(), cache: 'no-store' });
    if (!tr.ok) throw new Error('token');
    const { token } = await tr.json();
    const url = `/api/audio/clip/${encodeURIComponent(filename)}?t=${encodeURIComponent(token)}`;
    _clipEl = new Audio(url);
    _clipEl.onended = _clipEl.onerror = () => {
      _clipEl = null;
      const b = _clipBtn; _clipBtn = null;
      _clipReset(b);
    };
    await _clipEl.play();
    btn.classList.remove('loading');
    btn.textContent = '⏹';
    btn.classList.add('playing');
  } catch(e) {
    const b = _clipBtn; _clipBtn = null;
    _clipReset(b);
    if (e.name !== 'AbortError') console.error('Clip playback failed:', e);
  } finally {
    _clipLoading = false;
  }
}


async function downloadClip(filename) {
  try {
    const tr = await fetch('/api/audio/token', { headers: authHeader(), cache: 'no-store' });
    if (!tr.ok) return;
    const { token } = await tr.json();
    const a = document.createElement('a');
    a.href = `/api/audio/clip/${encodeURIComponent(filename)}?t=${encodeURIComponent(token)}`;
    a.download = filename;
    a.click();
  } catch(e) { console.error('Download failed:', e); }
}

// ── Map view ──────────────────────────────────────────────────────────────────
let _leafletLoaded = false;
let _map           = null;
let _mapMarkers    = {};   // incident number → Leaflet marker
let _mapFilterStatus = 'all';      // 'live' | 'all'
let _mapFilterHours  = 4;          // null = no time limit | 4 | 12 | 24

const LAFAYETTE_LL  = [40.4167, -86.8753];
const MAP_STATUS_COLORS = {
  active:  '#f59e0b',
  routine: '#6b7280',
  clear:   '#22c55e',
};

function _markerStyle(incident) {
  if (incident.is_stale) {
    return { radius: 8, fillColor: '#6b7280', color: '#4b5563', weight: 1, opacity: 0.5, fillOpacity: 0.22 };
  }
  const color = MAP_STATUS_COLORS[incident.status_kind || 'active'] || '#3b82f6';
  return { radius: 10, fillColor: color, color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9 };
}

function _loadLeaflet() {
  if (_leafletLoaded) return Promise.resolve();
  _leafletLoaded = true;
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    s.crossOrigin = '';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

let _userMarker  = null;
let _userCircle  = null;
let _userWatcher = null;
let _userFirstFix = true;
let _locateBtn   = null;

async function initMap() {
  await _loadLeaflet();
  if (_map) {
    requestAnimationFrame(() => _map.invalidateSize());
    return;
  }
  const _savedView = (() => { try { return JSON.parse(localStorage.getItem('p25_map_view')); } catch(_){} return null; })();
  const _initCenter = _savedView ? [_savedView.lat, _savedView.lng] : LAFAYETTE_LL;
  const _initZoom   = _savedView ? _savedView.zoom : 12;
  _map = L.map('leaflet-map', { center: _initCenter, zoom: _initZoom, zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(_map);

  _map.on('moveend zoomend', () => {
    const c = _map.getCenter();
    try { localStorage.setItem('p25_map_view', JSON.stringify({ lat: c.lat, lng: c.lng, zoom: _map.getZoom() })); } catch(_) {}
  });

  // Locate button
  const LocateCtrl = L.Control.extend({ onAdd() {
    const btn = L.DomUtil.create('button', 'leaflet-locate-btn');
    btn.innerHTML = '◎';
    btn.title = 'My location';
    _locateBtn = btn;
    L.DomEvent.on(btn, 'click', L.DomEvent.stopPropagation);
    L.DomEvent.on(btn, 'click', () => {
      if (_userMarker) {
        _map.setView(_userMarker.getLatLng(), 15, { animate: true });
        btn.classList.add('tracking');
        setTimeout(() => btn.classList.remove('tracking'), 1200);
      } else {
        _startUserLocation(true);
      }
    });
    return btn;
  }});
  new LocateCtrl({ position: 'topleft' }).addTo(_map);

  _startUserLocation(false);
}

function _startUserLocation(zoomNow) {
  if (!navigator.geolocation) return;
  if (_userWatcher != null) {
    if (zoomNow && _userMarker) _map.setView(_userMarker.getLatLng(), 15, { animate: true });
    return;
  }
  _userWatcher = navigator.geolocation.watchPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    if (!_map) return;
    if (!_userMarker) {
      _userCircle = L.circle([lat, lng], {
        radius: accuracy, color: '#3b82f6', fillColor: '#3b82f6',
        fillOpacity: 0.1, weight: 1,
      }).addTo(_map);
      _userMarker = L.circleMarker([lat, lng], {
        radius: 7, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 1,
      }).bindTooltip('You', { permanent: false }).addTo(_map);
      if (_userFirstFix) {
        _userFirstFix = false;
        _map.setView([lat, lng], 14, { animate: true });
      }
    } else {
      _userMarker.setLatLng([lat, lng]);
      _userCircle.setLatLng([lat, lng]);
      _userCircle.setRadius(accuracy);
    }
    if (zoomNow) {
      _map.setView([lat, lng], 15, { animate: true });
      zoomNow = false;
    }
  }, err => console.warn('Geolocation:', err),
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 });
}

function _markerFor(incident, lat, lng) {
  const title  = incident.number ? `#${incident.number} ${incident.title || ''}` : (incident.title || 'Incident');
  const marker = L.circleMarker([lat, lng], _markerStyle(incident));
  const popupHtml = `
    <div class="map-popup-title">${escHtml(title)}</div>
    <div class="map-popup-sub">${escHtml(incident.status || 'WATCH')} · ${escHtml(incident.agency || '')}</div>
    <div class="map-popup-sub">${escHtml(incident.location || '')}</div>
    ${incident.first_seen ? `<div class="map-popup-sub" style="margin-bottom:8px">First: ${escHtml(incident.first_seen)}</div>` : '<div style="margin-bottom:8px"></div>'}
    <button class="map-popup-btn" onclick="goToIncidentCard(${Number(incident.number)})">Details</button>`;
  marker.bindPopup(popupHtml, { maxWidth: 260 });
  return marker;
}

function _updateMapStatus(count) {
  const bar = document.getElementById('map-status-bar');
  if (!bar) return;
  bar.textContent = count
    ? `${count} active incident${count === 1 ? '' : 's'} mapped`
    : 'No active incidents with locations';
}

function _mapAgencyMatch(agency) {
  const a = (agency || '').toUpperCase();
  if (filter === 'police') return /LPD|WLPD|TCSD|PUPD|ISP|SHERIFF|POLICE/.test(a);
  if (filter === 'fire')   return /LFD|WLFD|TCFD|PUFD|FIRE/.test(a);
  if (filter === 'ems')    return /EMS|TEAS/.test(a);
  return true;
}
function _mapTrunkMatch(agency) {
  if (trunkFilter === 'all') return true;
  const a = (agency || '').toUpperCase();
  const isSafet = /\bISP\b|INDOT/.test(a);
  if (trunkFilter === 'safet')      return isSafet;
  if (trunkFilter === 'tippecanoe') return !isSafet;
  return true;
}
function _mapFilterMatch(i) {
  if (i.lat == null || i.lng == null) return false;
  if (!_mapAgencyMatch(i.agency))  return false;
  if (!_mapTrunkMatch(i.agency))   return false;
  if (_mapFilterHours != null) {
    const age = i.last_seen ? (Date.now() / 1000 - new Date(i.last_seen).getTime() / 1000) : Infinity;
    if (age > _mapFilterHours * 3600) return false;
  }
  if (_mapFilterStatus === 'all') return true;
  return !i.is_stale && (i.status_kind || 'active') !== 'clear';
}

function renderMap() {
  if (!_map) return;
  const showable = incidents.filter(_mapFilterMatch);
  const showIds = new Set(showable.map(i => String(i.number)));

  for (const [id, marker] of Object.entries(_mapMarkers)) {
    if (!showIds.has(id)) { marker.remove(); delete _mapMarkers[id]; }
  }

  for (const incident of showable) {
    const id = String(incident.number);
    if (_mapMarkers[id]) {
      _mapMarkers[id].setStyle(_markerStyle(incident));
    } else {
      const marker = _markerFor(incident, incident.lat, incident.lng);
      marker.addTo(_map);
      _mapMarkers[id] = marker;
    }
  }
  _updateMapStatus(showable.length);
}

function goToIncidentOnMap(number) {
  const incident = findIncident(number);
  if (!incident || incident.lat == null || incident.lng == null) return;

  // Default to All/4h; only widen the time window if the target incident is older.
  const ageHrs = incident.last_seen
    ? (Date.now() - new Date(incident.last_seen).getTime()) / 3600000 : Infinity;
  _mapFilterStatus = 'all';
  _mapFilterHours  = ageHrs <= 4 ? 4 : ageHrs <= 12 ? 12 : ageHrs <= 24 ? 24 : null;
  filter      = 'all';
  trunkFilter = 'all';
  document.querySelectorAll('.map-filter-btn[data-mf-status]').forEach(b =>
    b.classList.toggle('active', b.dataset.mfStatus === 'all'));
  document.querySelectorAll('.map-filter-btn[data-mf-hours]').forEach(b =>
    b.classList.toggle('active', b.dataset.mfHours === String(_mapFilterHours ?? '')));
  try { _syncActiveFilterDim(); } catch(_) {}
  document.querySelectorAll('[data-filter]').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === 'all'));
  document.querySelectorAll('[data-trunk]').forEach(b =>
    b.classList.toggle('active', b.dataset.trunk === 'all'));

  document.getElementById('incident-modal').classList.remove('open');
  setView('map', false, () => {
    const marker = _mapMarkers[String(incident.number)];
    _map.setView([incident.lat, incident.lng], 15, { animate: false });
    if (marker) marker.openPopup();
  });
}

function goToIncidentCard(number) {
  if (_map) _map.closePopup();
  setView('incidents');
  requestAnimationFrame(() => {
    const el = document.querySelector(`.incident-card[data-number="${number}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.remove('jump-target');
      void el.offsetWidth;
      el.classList.add('jump-target');
    }
    openIncidentModal(number);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init(data) {
  entries = Array.isArray(data) ? data : (data.entries || []);
  entriesLatest = Array.isArray(data) ? [...entries].reverse() : (data.entries_latest || [...entries].reverse());
  incidents = Array.isArray(data) ? [] : (data.incidents || []);
  const latest = entries.at(-1);
  lastFeedSig = JSON.stringify({
    count: entries.length,
    latest: latest ? [latest.type, latest.time, latest.talkgroup || '', latest.text || ''] : [],
    log_size: Array.isArray(data) ? 0 : data.log_size,
    log_mtime: Array.isArray(data) ? 0 : data.log_mtime,
  });
  lastIncidentSig = JSON.stringify(incidents.map(i => [
    i.number, i.title, i.status, i.status_kind, i.location, i.last_seen, i.action, (i.details || []).join('|')
  ]));
  lastStateSig = JSON.stringify({ feed: lastFeedSig, incidents: lastIncidentSig });
  renderFeed();
  renderIncidents();
  setView(location.hash.slice(1));
  startPolling();
  syncEntries();
}
